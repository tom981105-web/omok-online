<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>온라인 오목</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      text-align: center;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: 34px;
    }

    .panel {
      max-width: 560px;
      margin: 0 auto 10px;
      padding: 10px;
    }

    input, button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      margin: 4px;
    }

    input {
      width: 130px;
    }

    button {
      background: #f59e0b;
      color: #111;
      font-weight: bold;
      cursor: pointer;
    }

    #status {
      margin: 10px 0;
      font-weight: bold;
      color: #facc15;
    }

    .info {
      font-size: 14px;
      color: #d1d5db;
      line-height: 1.7;
    }

    .players {
      margin: 8px auto;
      padding: 10px;
      max-width: 420px;
      background: rgba(255,255,255,.08);
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.8;
    }

    .board-wrap {
      width: 100vw;
      overflow-x: auto;
      padding: 12px 0 22px;
      box-sizing: border-box;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(15, 42px);
      grid-template-rows: repeat(15, 42px);
      width: 630px;
      height: 630px;
      margin: 0 auto;
      background: #d6a44f;
      border: 4px solid #7c4a12;
      box-sizing: content-box;
      touch-action: manipulation;
    }

    .cell {
      position: relative;
      border-right: 1px solid rgba(80, 40, 0, .55);
      border-bottom: 1px solid rgba(80, 40, 0, .55);
      box-sizing: border-box;
    }

    .cell::after {
      content: "";
      position: absolute;
      width: 74%;
      height: 74%;
      border-radius: 50%;
      top: 13%;
      left: 13%;
    }

    .black::after {
      background: #111;
      box-shadow: inset -3px -3px 5px rgba(255,255,255,.15);
    }

    .white::after {
      background: #f8fafc;
      box-shadow: inset -3px -3px 5px rgba(0,0,0,.22);
    }

    .selected::before {
      content: "";
      position: absolute;
      width: 40%;
      height: 40%;
      top: 30%;
      left: 30%;
      border-radius: 50%;
      background: rgba(239, 68, 68, .75);
      z-index: 2;
    }

    .confirm-box {
      margin: 6px auto 10px;
      display: none;
    }

    .confirm-box.show {
      display: block;
    }

    @media (max-width: 720px) {
      h1 {
        font-size: 30px;
      }

      .panel {
        padding: 8px;
      }

      input {
        width: 118px;
      }

      #board {
        grid-template-columns: repeat(15, 36px);
        grid-template-rows: repeat(15, 36px);
        width: 540px;
        height: 540px;
      }

      .board-wrap {
        overflow-x: scroll;
      }
    }
  </style>
</head>
<body>
  <h1>온라인 오목</h1>

  <div class="panel">
    <input id="nameInput" placeholder="닉네임" />
    <br />
    <button id="createBtn">방 만들기</button>
    <input id="roomInput" placeholder="방 코드 입력" />
    <button id="joinBtn">입장</button>
    <button id="resetBtn">다시하기</button>

    <div id="status">닉네임 입력 후 방을 만들거나 입장하세요.</div>

    <div class="info">
      내 색상: <span id="myColor">-</span><br />
      방 코드: <span id="roomCode">-</span>
    </div>

    <div class="players">
      ⚫ 흑돌: <span id="blackPlayer">대기 중</span><br />
      ⚪ 백돌: <span id="whitePlayer">대기 중</span><br />
      접속 상태: <span id="connectStatus">-</span>
    </div>

    <div id="confirmBox" class="confirm-box">
      <button id="confirmBtn">여기에 두기</button>
      <button id="cancelBtn">취소</button>
    </div>
  </div>

  <div class="board-wrap">
    <div id="board"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      get,
      onValue,
      update,
      runTransaction,
      serverTimestamp,
      onDisconnect
    } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDTsFoSmI1oOS5XLXhhgqyeDmwr8RxEegE",
      authDomain: "ohmok-cd7bd.firebaseapp.com",
      databaseURL: "https://ohmok-cd7bd-default-rtdb.firebaseio.com",
      projectId: "ohmok-cd7bd",
      storageBucket: "ohmok-cd7bd.firebasestorage.app",
      messagingSenderId: "640930093452",
      appId: "1:640930093452:web:0c67d9bb5c8dc3cdb35ea9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const SIZE = 15;

    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const roomInput = document.getElementById("roomInput");
    const nameInput = document.getElementById("nameInput");
    const roomCodeEl = document.getElementById("roomCode");
    const myColorEl = document.getElementById("myColor");
    const blackPlayerEl = document.getElementById("blackPlayer");
    const whitePlayerEl = document.getElementById("whitePlayer");
    const connectStatusEl = document.getElementById("connectStatus");
    const confirmBox = document.getElementById("confirmBox");

    let roomId = "";
    let myColor = "";
    let currentRoomData = null;
    let selected = null;

    const clientId =
      localStorage.getItem("omokClientId") ||
      crypto.randomUUID();

    localStorage.setItem("omokClientId", clientId);

    nameInput.value = localStorage.getItem("omokNickname") || "";

    function getNickname() {
      const name = nameInput.value.trim();
      if (!name) {
        alert("닉네임을 입력하세요.");
        return "";
      }
      localStorage.setItem("omokNickname", name);
      return name;
    }

    function emptyBoard() {
      return Array.from({ length: SIZE }, () => Array(SIZE).fill(""));
    }

    function makeRoomCode() {
      return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    function renderBoard(board = emptyBoard()) {
      boardEl.innerHTML = "";

      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          const cell = document.createElement("div");
          cell.className = "cell";

          if (board[y][x] === "black") cell.classList.add("black");
          if (board[y][x] === "white") cell.classList.add("white");

          if (selected && selected.x === x && selected.y === y) {
            cell.classList.add("selected");
          }

          cell.onclick = () => selectCell(x, y);
          boardEl.appendChild(cell);
        }
      }
    }

    function selectCell(x, y) {
      if (!roomId || !myColor || !currentRoomData) return;
      if (currentRoomData.winner) return;
      if (currentRoomData.turn !== myColor) return;
      if (currentRoomData.board[y][x]) return;

      selected = { x, y };
      confirmBox.classList.add("show");
      renderBoard(currentRoomData.board);
    }

    async function confirmPlace() {
      if (!selected) return;
      const { x, y } = selected;
      selected = null;
      confirmBox.classList.remove("show");
      await placeStone(x, y);
    }

    function cancelSelect() {
      selected = null;
      confirmBox.classList.remove("show");
      if (currentRoomData) renderBoard(currentRoomData.board);
    }

    function updatePlayers(data) {
      const black = data.players?.blackName || "대기 중";
      const white = data.players?.whiteName || "대기 중";

      blackPlayerEl.textContent = black;
      whitePlayerEl.textContent = white;

      const blackOnline = data.presence?.black ? "접속" : "미접속";
      const whiteOnline = data.presence?.white ? "접속" : "미접속";

      connectStatusEl.textContent = `흑돌 ${blackOnline} / 백돌 ${whiteOnline}`;
    }

    function updateStatus(data) {
      if (!data) return;

      updatePlayers(data);

      if (data.winner) {
        statusEl.textContent =
          data.winner === myColor
            ? "승리했습니다!"
            : data.winner === "draw"
              ? "무승부입니다."
              : "패배했습니다.";
        return;
      }

      if (!myColor) {
        statusEl.textContent = "관전 중입니다.";
        return;
      }

      if (data.turn === myColor) {
        statusEl.textContent = "내 차례입니다. 칸을 누른 뒤 ‘여기에 두기’를 누르세요.";
      } else {
        statusEl.textContent = "상대방 차례입니다.";
      }
    }

    async function createRoom() {
      try {
        const nickname = getNickname();
        if (!nickname) return;

        roomId = makeRoomCode();
        myColor = "black";

        const data = {
          board: emptyBoard(),
          turn: "black",
          winner: "",
          createdAt: serverTimestamp(),
          players: {
            black: clientId,
            blackName: nickname,
            white: "",
            whiteName: ""
          },
          presence: {
            black: true,
            white: false
          }
        };

        await set(ref(db, `rooms/${roomId}`), data);
        enterRoom(roomId);
      } catch (err) {
        alert("방 만들기 실패: " + err.message);
        console.error(err);
      }
    }

    async function joinRoom() {
      try {
        const nickname = getNickname();
        if (!nickname) return;

        const code = roomInput.value.trim().toUpperCase();

        if (!code) {
          alert("방 코드를 입력하세요.");
          return;
        }

        const snap = await get(ref(db, `rooms/${code}`));

        if (!snap.exists()) {
          alert("없는 방 코드입니다.");
          return;
        }

        const data = snap.val();
        roomId = code;

        if (data.players?.black === clientId) {
          myColor = "black";
          await update(ref(db, `rooms/${roomId}`), {
            "players/blackName": nickname,
            "presence/black": true
          });
        } else if (data.players?.white === clientId) {
          myColor = "white";
          await update(ref(db, `rooms/${roomId}`), {
            "players/whiteName": nickname,
            "presence/white": true
          });
        } else if (!data.players?.white) {
          myColor = "white";
          await update(ref(db, `rooms/${roomId}`), {
            "players/white": clientId,
            "players/whiteName": nickname,
            "presence/white": true
          });
        } else {
          myColor = "";
        }

        enterRoom(roomId);
      } catch (err) {
        alert("입장 실패: " + err.message);
        console.error(err);
      }
    }

    function setupDisconnect() {
      if (!roomId || !myColor) return;

      const presenceRef = ref(db, `rooms/${roomId}/presence/${myColor}`);
      set(presenceRef, true);
      onDisconnect(presenceRef).set(false);
    }

    function enterRoom(code) {
      roomId = code;
      roomCodeEl.textContent = roomId;
      roomInput.value = roomId;

      myColorEl.textContent =
        myColor === "black" ? "흑돌" :
        myColor === "white" ? "백돌" :
        "관전";

      setupDisconnect();

      onValue(ref(db, `rooms/${roomId}`), (snap) => {
        currentRoomData = snap.val();

        if (!currentRoomData) return;

        renderBoard(currentRoomData.board);
        updateStatus(currentRoomData);
      });
    }

    async function placeStone(x, y) {
      if (!roomId || !myColor) return;

      await runTransaction(ref(db, `rooms/${roomId}`), (data) => {
        if (!data) return data;
        if (data.winner) return data;
        if (data.turn !== myColor) return data;
        if (data.board[y][x]) return data;

        data.board[y][x] = myColor;

        if (checkWin(data.board, x, y, myColor)) {
          data.winner = myColor;
        } else if (isFull(data.board)) {
          data.winner = "draw";
        } else {
          data.turn = myColor === "black" ? "white" : "black";
        }

        return data;
      });
    }

    function checkWin(board, x, y, color) {
      const dirs = [
        [1, 0],
        [0, 1],
        [1, 1],
        [1, -1]
      ];

      for (const [dx, dy] of dirs) {
        let count = 1;
        count += countDir(board, x, y, dx, dy, color);
        count += countDir(board, x, y, -dx, -dy, color);
        if (count >= 5) return true;
      }

      return false;
    }

    function countDir(board, x, y, dx, dy, color) {
      let count = 0;
      let nx = x + dx;
      let ny = y + dy;

      while (
        nx >= 0 &&
        ny >= 0 &&
        nx < SIZE &&
        ny < SIZE &&
        board[ny][nx] === color
      ) {
        count++;
        nx += dx;
        ny += dy;
      }

      return count;
    }

    function isFull(board) {
      return board.every(row => row.every(cell => cell));
    }

    async function resetGame() {
      if (!roomId) return;

      selected = null;
      confirmBox.classList.remove("show");

      await update(ref(db, `rooms/${roomId}`), {
        board: emptyBoard(),
        turn: "black",
        winner: ""
      });
    }

    document.getElementById("createBtn").onclick = createRoom;
    document.getElementById("joinBtn").onclick = joinRoom;
    document.getElementById("resetBtn").onclick = resetGame;
    document.getElementById("confirmBtn").onclick = confirmPlace;
    document.getElementById("cancelBtn").onclick = cancelSelect;

    renderBoard();
  </script>
</body>
</html>
