<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>온라인 오목</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      text-align: center;
    }

    h1 { margin: 18px 0 8px; }

    .panel {
      max-width: 520px;
      margin: 0 auto 12px;
      padding: 12px;
    }

    input, button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      margin: 4px;
    }

    button {
      background: #f59e0b;
      color: #111;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    #status {
      margin: 10px 0;
      font-weight: bold;
      color: #facc15;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      width: min(94vw, 560px);
      height: min(94vw, 560px);
      margin: 12px auto;
      background: #d6a44f;
      border: 4px solid #7c4a12;
      box-sizing: border-box;
    }

    .cell {
      position: relative;
      border-right: 1px solid rgba(80, 40, 0, .55);
      border-bottom: 1px solid rgba(80, 40, 0, .55);
      box-sizing: border-box;
    }

    .cell::after {
      content: "";
      position: absolute;
      width: 78%;
      height: 78%;
      border-radius: 50%;
      top: 11%;
      left: 11%;
    }

    .black::after {
      background: #111;
      box-shadow: inset -3px -3px 5px rgba(255,255,255,.15);
    }

    .white::after {
      background: #f8fafc;
      box-shadow: inset -3px -3px 5px rgba(0,0,0,.22);
    }

    .info {
      font-size: 14px;
      color: #d1d5db;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>온라인 오목</h1>

  <div class="panel">
    <button id="createBtn">방 만들기</button>
    <input id="roomInput" placeholder="방 코드 입력" />
    <button id="joinBtn">입장</button>
    <button id="resetBtn">다시하기</button>

    <div id="status">방을 만들거나 방 코드로 입장하세요.</div>
    <div class="info">
      내 색상: <span id="myColor">-</span><br />
      방 코드: <span id="roomCode">-</span>
    </div>
  </div>

  <div id="board"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      get,
      onValue,
      update,
      runTransaction,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDTsFoSmI1oOS5XLXhhgqyeDmwr8RxEegE",
      authDomain: "ohmok-cd7bd.firebaseapp.com",

      // 여기에 Realtime Database URL을 넣어야 함
      // 예시: "https://ohmok-cd7bd-default-rtdb.firebaseio.com"
      databaseURL: "https://ohmok-cd7bd-default-rtdb.firebaseio.com",

      projectId: "ohmok-cd7bd",
      storageBucket: "ohmok-cd7bd.firebasestorage.app",
      messagingSenderId: "640930093452",
      appId: "1:640930093452:web:0c67d9bb5c8dc3cdb35ea9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const SIZE = 15;
    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const roomInput = document.getElementById("roomInput");
    const roomCodeEl = document.getElementById("roomCode");
    const myColorEl = document.getElementById("myColor");

    let roomId = "";
    let myColor = "";
    let currentRoomData = null;

    const clientId =
      localStorage.getItem("omokClientId") ||
      crypto.randomUUID();

    localStorage.setItem("omokClientId", clientId);

    function emptyBoard() {
      return Array.from({ length: SIZE }, () => Array(SIZE).fill(""));
    }

    function makeRoomCode() {
      return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    function renderBoard(board = emptyBoard()) {
      boardEl.innerHTML = "";

      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          const cell = document.createElement("div");
          cell.className = "cell";

          if (board[y][x] === "black") cell.classList.add("black");
          if (board[y][x] === "white") cell.classList.add("white");

          cell.onclick = () => placeStone(x, y);
          boardEl.appendChild(cell);
        }
      }
    }

    function updateStatus(data) {
      if (!data) return;

      if (data.winner) {
        statusEl.textContent =
          data.winner === myColor
            ? "승리했습니다!"
            : data.winner === "draw"
              ? "무승부입니다."
              : "패배했습니다.";
        return;
      }

      if (!myColor) {
        statusEl.textContent = "관전 중입니다.";
        return;
      }

      if (data.turn === myColor) {
        statusEl.textContent = "내 차례입니다.";
      } else {
        statusEl.textContent = "상대방 차례입니다.";
      }
    }

    async function createRoom() {
      roomId = makeRoomCode();
      myColor = "black";

      const data = {
        board: emptyBoard(),
        turn: "black",
        winner: "",
        createdAt: serverTimestamp(),
        players: {
          black: clientId,
          white: ""
        }
      };

      await set(ref(db, `rooms/${roomId}`), data);
      enterRoom(roomId);
    }

    async function joinRoom() {
      const code = roomInput.value.trim().toUpperCase();
      if (!code) {
        alert("방 코드를 입력하세요.");
        return;
      }

      const snap = await get(ref(db, `rooms/${code}`));

      if (!snap.exists()) {
        alert("없는 방 코드입니다.");
        return;
      }

      const data = snap.val();

      roomId = code;

      if (data.players?.black === clientId) {
        myColor = "black";
      } else if (data.players?.white === clientId) {
        myColor = "white";
      } else if (!data.players?.white) {
        myColor = "white";
        await update(ref(db, `rooms/${roomId}/players`), {
          white: clientId
        });
      } else {
        myColor = "";
      }

      enterRoom(roomId);
    }

    function enterRoom(code) {
      roomId = code;
      roomCodeEl.textContent = roomId;
      roomInput.value = roomId;
      myColorEl.textContent =
        myColor === "black" ? "흑돌" :
        myColor === "white" ? "백돌" :
        "관전";

      onValue(ref(db, `rooms/${roomId}`), (snap) => {
        currentRoomData = snap.val();

        if (!currentRoomData) return;

        renderBoard(currentRoomData.board);
        updateStatus(currentRoomData);
      });
    }

    async function placeStone(x, y) {
      if (!roomId || !myColor) return;

      await runTransaction(ref(db, `rooms/${roomId}`), (data) => {
        if (!data) return data;
        if (data.winner) return data;
        if (data.turn !== myColor) return data;
        if (data.board[y][x]) return data;

        data.board[y][x] = myColor;

        if (checkWin(data.board, x, y, myColor)) {
          data.winner = myColor;
        } else if (isFull(data.board)) {
          data.winner = "draw";
        } else {
          data.turn = myColor === "black" ? "white" : "black";
        }

        return data;
      });
    }

    function checkWin(board, x, y, color) {
      const dirs = [
        [1, 0],
        [0, 1],
        [1, 1],
        [1, -1]
      ];

      for (const [dx, dy] of dirs) {
        let count = 1;

        count += countDir(board, x, y, dx, dy, color);
        count += countDir(board, x, y, -dx, -dy, color);

        if (count >= 5) return true;
      }

      return false;
    }

    function countDir(board, x, y, dx, dy, color) {
      let count = 0;
      let nx = x + dx;
      let ny = y + dy;

      while (
        nx >= 0 &&
        ny >= 0 &&
        nx < SIZE &&
        ny < SIZE &&
        board[ny][nx] === color
      ) {
        count++;
        nx += dx;
        ny += dy;
      }

      return count;
    }

    function isFull(board) {
      return board.every(row => row.every(cell => cell));
    }

    async function resetGame() {
      if (!roomId) return;

      await update(ref(db, `rooms/${roomId}`), {
        board: emptyBoard(),
        turn: "black",
        winner: ""
      });
    }

    document.getElementById("createBtn").onclick = createRoom;
    document.getElementById("joinBtn").onclick = joinRoom;
    document.getElementById("resetBtn").onclick = resetGame;

    renderBoard();
  </script>
</body>
</html>
