<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>온라인 미니게임 허브</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #1f2937 0, #111827 45%, #030712 100%);
      color: white;
      text-align: center;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 14px 40px;
    }

    h1 {
      margin: 18px 0 8px;
      font-size: 38px;
    }

    .subtitle {
      color: #d1d5db;
      margin-bottom: 22px;
      line-height: 1.6;
    }

    .box {
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 22px;
      padding: 18px;
      margin: 14px 0;
      box-shadow: 0 18px 60px rgba(0,0,0,.22);
    }

    input, button {
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      margin: 5px;
    }

    input {
      width: min(92vw, 260px);
      background: #f8fafc;
      color: #111827;
    }

    button {
      background: #f59e0b;
      color: #111827;
      font-weight: bold;
      cursor: pointer;
    }

    button.secondary {
      background: #374151;
      color: white;
    }

    button:hover {
      filter: brightness(1.05);
    }

    .hidden {
      display: none !important;
    }

    .status {
      margin-top: 12px;
      color: #facc15;
      font-weight: bold;
      line-height: 1.5;
    }

    .small {
      color: #d1d5db;
      font-size: 13px;
      line-height: 1.6;
    }

    .game-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }

    .game-card {
      display: block;
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 24px;
      padding: 24px 18px;
      transition: transform .15s ease, background .15s ease;
    }

    .game-card:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,.17);
    }

    .emoji {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .game-card h2 {
      margin: 6px 0;
      font-size: 24px;
    }

    .game-card p {
      margin: 8px 0 0;
      color: #d1d5db;
      line-height: 1.5;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #22c55e;
      color: #052e16;
      font-size: 12px;
      font-weight: bold;
    }

    @media (max-width: 720px) {
      h1 {
        font-size: 30px;
      }

      .game-grid {
        grid-template-columns: 1fr;
      }

      .box {
        border-radius: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>온라인 미니게임 허브</h1>
    <div class="subtitle">
      친구와 같이 즐기는 간단한 온라인 게임 모음<br />
      로그인 후 원하는 게임을 선택하세요.
    </div>

    <section id="authBox" class="box">
      <h2>로그인 / 회원가입</h2>

      <input id="emailInput" type="email" placeholder="이메일" /><br />
      <input id="passwordInput" type="password" placeholder="비밀번호 6자리 이상" /><br />
      <input id="nameInput" placeholder="닉네임" /><br />

      <button id="signupBtn">회원가입</button>
      <button id="loginBtn">로그인</button>

      <div id="authStatus" class="status">로그인이 필요합니다.</div>
      <div class="small">
        회원가입 시 닉네임이 저장됩니다. 이후 게임에서는 같은 계정 정보를 사용합니다.
      </div>
    </section>

    <section id="menuBox" class="hidden">
      <div class="box">
        <div>
          로그인: <b id="userEmail">-</b><br />
          닉네임: <b id="userName">-</b>
        </div>

        <button id="logoutBtn" class="secondary">로그아웃</button>
      </div>

      <div class="game-grid">
        <a class="game-card" href="./board.html">
          <div class="emoji">⚫</div>
          <h2>오목 / 알까기</h2>
          <p>
            방을 만들고 친구와 실시간으로 오목 또는 알까기를 즐길 수 있습니다.
          </p>
          <span class="badge">멀티플레이</span>
        </a>

        <a class="game-card" href="./fishing.html">
          <div class="emoji">🎣</div>
          <h2>낚시게임</h2>
          <p>
            물고기를 잡고 판매해서 돈을 벌고, 낚싯대와 미끼를 업그레이드합니다.
          </p>
          <span class="badge">싱글 성장형</span>
        </a>
      </div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js";
    import {
      getDatabase,
      ref,
      set,
      get,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDTsFoSmI1oOS5XLXhhgqyeDmwr8RxEegE",
      authDomain: "ohmok-cd7bd.firebaseapp.com",
      databaseURL: "https://ohmok-cd7bd-default-rtdb.firebaseio.com",
      projectId: "ohmok-cd7bd",
      storageBucket: "ohmok-cd7bd.firebasestorage.app",
      messagingSenderId: "640930093452",
      appId: "1:640930093452:web:0c67d9bb5c8dc3cdb35ea9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const authBox = document.getElementById("authBox");
    const menuBox = document.getElementById("menuBox");

    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const nameInput = document.getElementById("nameInput");

    const authStatus = document.getElementById("authStatus");
    const userEmail = document.getElementById("userEmail");
    const userName = document.getElementById("userName");

    nameInput.value = localStorage.getItem("gameNickname") || "";

    async function signup() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      const name = nameInput.value.trim();

      if (!email || !password || !name) {
        alert("이메일, 비밀번호, 닉네임을 모두 입력하세요.");
        return;
      }

      try {
        const result = await createUserWithEmailAndPassword(auth, email, password);
        localStorage.setItem("gameNickname", name);

        await set(ref(db, `users/${result.user.uid}`), {
          email,
          nickname: name,
          wins: 0,
          losses: 0,
          draws: 0,
          fishing: {
            gold: 0,
            rodLevel: 1,
            bait: 5,
            inventory: {},
            totalCaught: 0,
            totalEarned: 0
          },
          createdAt: serverTimestamp()
        });

        authStatus.textContent = "회원가입 완료";
      } catch (err) {
        alert("회원가입 실패: " + koreanAuthError(err.code));
      }
    }

    async function login() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        alert("이메일과 비밀번호를 입력하세요.");
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        alert("로그인 실패: " + koreanAuthError(err.code));
      }
    }

    async function logout() {
      await signOut(auth);
      location.reload();
    }

    onAuthStateChanged(auth, async user => {
      if (!user) {
        authBox.classList.remove("hidden");
        menuBox.classList.add("hidden");
        return;
      }

      const userSnap = await get(ref(db, `users/${user.uid}`));
      const userData = userSnap.val() || {};

      const nickname =
        userData.nickname ||
        localStorage.getItem("gameNickname") ||
        user.email.split("@")[0];

      userEmail.textContent = user.email;
      userName.textContent = nickname;

      authBox.classList.add("hidden");
      menuBox.classList.remove("hidden");
    });

    function koreanAuthError(code) {
      const map = {
        "auth/email-already-in-use": "이미 사용 중인 이메일입니다.",
        "auth/invalid-email": "이메일 형식이 올바르지 않습니다.",
        "auth/weak-password": "비밀번호는 6자리 이상이어야 합니다.",
        "auth/user-not-found": "가입되지 않은 이메일입니다.",
        "auth/wrong-password": "비밀번호가 틀렸습니다.",
        "auth/invalid-credential": "이메일 또는 비밀번호가 올바르지 않습니다.",
        "auth/network-request-failed": "네트워크 요청에 실패했습니다. 브라우저, 보안앱, 도메인 설정을 확인하세요."
      };

      return map[code] || code;
    }

    document.getElementById("signupBtn").onclick = signup;
    document.getElementById("loginBtn").onclick = login;
    document.getElementById("logoutBtn").onclick = logout;
  </script>
</body>
</html>
