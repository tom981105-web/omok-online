<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>낚시게임</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#082f49;color:white;text-align:center;padding-bottom:82px}
h1{margin:10px 0 4px;font-size:26px}
h2{margin:8px 0}
button{padding:10px 12px;border-radius:12px;border:none;font-size:14px;margin:4px;background:#f59e0b;color:#111;font-weight:bold;cursor:pointer}
button.secondary{background:#374151;color:white}
button.sell{background:#22c55e;color:#052e16}
button.bite{background:#ef4444;color:white;animation:pulse .75s infinite}
button:disabled{opacity:.45;cursor:not-allowed}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}

.wrap{max-width:900px;margin:0 auto;padding:6px}
.box{background:rgba(255,255,255,.1);border-radius:18px;padding:10px;margin:7px 0}
.hidden{display:none!important}
.status{color:#facc15;font-weight:bold;line-height:1.45;margin:8px 0}
.small{font-size:13px;color:#d1d5db;line-height:1.45}
.top-bar{display:flex;justify-content:space-between;align-items:center;gap:6px}
.top-bar .small{text-align:left;flex:1}

.quick-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0}
.quick-stat{background:rgba(255,255,255,.1);border-radius:12px;padding:7px 3px;font-size:12px;line-height:1.35}
.quick-stat b{font-size:16px}

.tab-page{display:none}
.tab-page.active{display:block}

.location-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:8px 0}
.location-card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:8px 4px;font-size:12px;cursor:pointer}
.location-card.active{background:#f59e0b;color:#111827;font-weight:bold}
.location-card.locked{opacity:.42;filter:grayscale(1)}
.location-card .lv{font-size:11px;color:inherit;opacity:.8}
.location-thumb{width:100%;height:90px;object-fit:cover;border-radius:10px;margin-bottom:6px;image-rendering:pixelated}

#pond{position:relative;height:260px;border-radius:22px;overflow:hidden;border:4px solid rgba(255,255,255,.25);background-size:cover;background-position:center;background-repeat:no-repeat;display:block;background-color:#0f172a;isolation:isolate}
#pond.active-scene{display:block}
#pond::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at center,rgba(255,255,255,.06),rgba(0,0,0,.24) 64%,rgba(0,0,0,.45));z-index:0;pointer-events:none}
#pond::after{content:"";position:absolute;inset:-20%;background:radial-gradient(circle,rgba(255,255,255,.35) 0 1px,transparent 2px) 10% 80%/90px 120px,radial-gradient(circle,rgba(125,211,252,.22) 0 1px,transparent 3px) 70% 85%/130px 160px;opacity:.45;z-index:1;pointer-events:none;animation:sceneSparkle 8s linear infinite}
@keyframes sceneSparkle{0%{transform:translateY(20px)}100%{transform:translateY(-40px)}}
#floatBobber{position:absolute;left:50%;top:42%;width:16px;height:34px;transform:translate(-50%,-50%);display:none;z-index:6}
#floatBobber::before{content:"";display:block;width:16px;height:16px;background:#ef4444;border-radius:50% 50% 0 0}
#floatBobber::after{content:"";display:block;width:16px;height:16px;background:#f8fafc;border-radius:0 0 50% 50%}
#floatBobber.waiting{display:block;animation:bobberWait 1.8s infinite ease-in-out}
#floatBobber.biteReady{display:block;animation:bobberBite .28s infinite ease-in-out}
@keyframes bobberWait{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-42%)}}
@keyframes bobberBite{0%,100%{transform:translate(-50%,-44%)}50%{transform:translate(-50%,-20%)}}


#bobberRipple{
  position:absolute;
  left:50%;
  top:42%;
  width:18px;
  height:18px;
  border:2px solid rgba(255,255,255,.55);
  border-radius:50%;
  transform:translate(-50%,-50%);
  display:none;
  pointer-events:none;
  animation:rippleLoop 1.6s infinite ease-out;
  z-index:5;
}
@keyframes rippleLoop{
  0%{width:14px;height:14px;opacity:.75}
  100%{width:76px;height:28px;opacity:0}
}
#splashEffect{
  position:absolute;
  left:50%;
  top:42%;
  width:80px;
  height:40px;
  transform:translate(-50%,-50%);
  display:none;
  pointer-events:none;
  z-index:7;
}
#splashEffect::before,
#splashEffect::after{
  content:"";
  position:absolute;
  width:10px;
  height:10px;
  background:rgba(255,255,255,.9);
  border-radius:50%;
  top:16px;
  animation:splashPop .55s ease-out forwards;
}
#splashEffect::before{left:20px}
#splashEffect::after{right:20px}
@keyframes splashPop{
  0%{transform:translateY(0) scale(.7);opacity:1}
  100%{transform:translateY(-28px) scale(1.4);opacity:0}
}

#fishShadow{position:absolute;left:50%;top:62%;z-index:4;width:90px;height:28px;background:rgba(0,0,0,.35);border-radius:50%;transform:translate(-50%,-50%);filter:blur(2px);display:none;animation:shadowMove 2.4s infinite ease-in-out}
@keyframes shadowMove{0%{transform:translate(-55%,-50%) scale(1)}50%{transform:translate(-45%,-45%) scale(1.08)}100%{transform:translate(-55%,-50%) scale(1)}}

.catch-result{margin-top:8px}
.catch-result img{width:56px;height:42px;object-fit:contain;image-rendering:pixelated;vertical-align:middle;margin-right:6px}

#fishGame{
  height:260px;
  background:#0f172a;
  border-radius:18px;
  position:relative;
  overflow:hidden;
  border:3px solid #64748b;
  isolation:isolate;
}
#fishGame::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:var(--mini-bg);
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  image-rendering:pixelated;
  filter:brightness(.48) blur(1px);
  opacity:.72;
  z-index:0;
}
#fishGame::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(255,255,255,.08) 0%, rgba(0,0,0,.15) 35%, rgba(0,0,0,.58) 100%),
    linear-gradient(90deg, rgba(15,23,42,.55), rgba(15,23,42,.08), rgba(15,23,42,.55));
  z-index:1;
  pointer-events:none;
}
.mini-bubbles{
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
  opacity:.55;
  background:
    radial-gradient(circle, rgba(255,255,255,.5) 0 2px, transparent 3px) 18% 85%/120px 160px,
    radial-gradient(circle, rgba(255,255,255,.35) 0 1.5px, transparent 3px) 72% 92%/90px 140px,
    radial-gradient(circle, rgba(147,197,253,.35) 0 2px, transparent 4px) 48% 88%/150px 190px;
  animation:bubbleFloat 5.5s linear infinite;
}
@keyframes bubbleFloat{
  0%{background-position:18% 105%,72% 112%,48% 108%}
  100%{background-position:18% -20%,72% -15%,48% -25%}
}
#track{position:absolute;left:50%;top:12px;transform:translateX(-50%);width:84px;height:230px;background:rgba(30,41,59,.72);border-radius:999px;border:2px solid rgba(203,213,225,.75);box-shadow:0 0 30px rgba(59,130,246,.18);z-index:3}
#catchBar{position:absolute;left:10px;width:60px;height:60px;background:rgba(34,197,94,.72);border:2px solid #bbf7d0;border-radius:12px;box-shadow:0 0 18px rgba(34,197,94,.32);z-index:4}
#fishSprite{position:absolute;left:14px;top:112px;width:56px;height:auto;object-fit:contain;image-rendering:pixelated;pointer-events:none;z-index:5}
#fishSprite.unknown{filter:brightness(0);opacity:.65}

#verticalProgress{
  position:absolute;
  left:8px;
  top:14px;
  bottom:14px;
  width:9px;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.25);
  border-radius:999px;
  overflow:hidden;
  z-index:6;
  box-shadow:inset 0 0 8px rgba(0,0,0,.35);
}
#verticalProgressFill{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:0%;
  background:#ef4444;
  border-radius:999px;
  transition:height .08s linear, background .18s linear, box-shadow .18s linear;
}
#verticalProgressFill.ready{
  box-shadow:0 0 16px rgba(34,197,94,.9);
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fish-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:rgba(255,255,255,.1);border-radius:12px;padding:9px;margin:5px 0;text-align:left}
.sell-control{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.qty-box{display:flex;align-items:center;gap:4px}
.qty-btn{width:32px;height:32px;padding:0;border-radius:9px;background:#374151;color:white}
.qty-num{min-width:34px;text-align:center;font-weight:bold}
.compact-shop{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.book-fish-img{width:42px;height:32px;object-fit:contain;image-rendering:pixelated;vertical-align:middle;margin-right:6px}
.undiscovered{filter:brightness(0);opacity:.5}
.r-common{color:#e5e7eb}
.r-uncommon{color:#86efac}
.r-rare{color:#93c5fd}
.r-epic{color:#d8b4fe}
.r-legend{color:#facc15}


.fish-card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(96px,1fr));
  gap:10px;
  justify-items:center;
}
.fish-card{
  position:relative;
  width:96px;
  height:96px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  user-select:none;
  transition:transform .12s ease, filter .12s ease;
}
.fish-card:active{transform:scale(.96)}
.fish-card .frame{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  image-rendering:pixelated;
  z-index:2;
  pointer-events:none;
}

.fish-card .fish-img{
  position:absolute;
  left:50%;
  top:42%;
  transform:translate(-50%,-50%);

  width:58px;
  height:44px;

  object-fit:contain;
  image-rendering:pixelated;

  z-index:4;
}
.fish-card .fish-name{
  position:absolute;
  left:8px;
  right:8px;
  bottom:12px;
  font-size:12px;
  font-weight:800;
  color:white;
  text-shadow:0 2px 4px #000,0 0 4px #000;
  z-index:4;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.fish-card .fish-count{
  position:absolute;
  right:10px;
  top:12px;
  font-size:12px;
  font-weight:900;
  color:#fff;
  text-shadow:0 2px 4px #000,0 0 4px #000;
  z-index:4;
}
.fish-card .fish-price{
  position:absolute;
  left:8px;
  top:12px;
  font-size:11px;
  font-weight:800;
  color:#facc15;
  text-shadow:0 2px 4px #000;
  z-index:4;
}
.fish-card.locked .fish-img{filter:brightness(0);opacity:.45}
.fish-card.locked{opacity:.82;cursor:default}
.fish-card.locked::after{
  content:"🔒";
  position:absolute;
  left:50%;
  top:43%;
  transform:translate(-50%,-50%);
  font-size:20px;
  z-index:5;
  text-shadow:0 2px 4px #000;
}


/* UI 2.0 icon/avatar patch */
.game-hud{
  display:grid;
  grid-template-columns:minmax(220px,1.2fr) minmax(280px,1fr) auto;
  gap:10px;
  align-items:center;
  margin:8px 0;
}
.hud-card{
  background:linear-gradient(180deg,rgba(15,23,42,.92),rgba(2,6,23,.82));
  border:1px solid rgba(148,163,184,.35);
  border-radius:14px;
  padding:9px 12px;
  display:flex;
  align-items:center;
  gap:10px;
  min-height:58px;
  box-shadow:0 8px 22px rgba(0,0,0,.22);
}
.hud-avatar{width:44px;height:44px;border-radius:12px;object-fit:cover;image-rendering:pixelated;border:1px solid rgba(255,255,255,.3);background:#0f172a}
.hud-info{text-align:left;line-height:1.25;min-width:0}
.hud-name{font-weight:900;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hud-sub{font-size:12px;color:#cbd5e1}
.hud-level{margin-left:auto;font-weight:900;color:#facc15;background:rgba(250,204,21,.1);padding:6px 10px;border-radius:999px}
.hud-resources{justify-content:space-around}
.resource-chip{display:flex;align-items:center;gap:8px;font-weight:900;font-size:18px;padding:0 8px;border-right:1px solid rgba(255,255,255,.12)}
.resource-chip:last-child{border-right:0}
.icon-img{width:24px;height:24px;object-fit:contain;image-rendering:pixelated}
.hud-actions{justify-content:flex-end}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-width:48px;height:42px;padding:8px 10px;background:#374151;color:white}
.icon-btn img{width:22px;height:22px;object-fit:contain;image-rendering:pixelated}
.avatar-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.avatar-modal-backdrop.show{display:flex}
.avatar-modal{width:min(460px,100%);background:#0f172a;border:1px solid rgba(148,163,184,.4);border-radius:20px;padding:18px;box-shadow:0 20px 70px rgba(0,0,0,.45)}
.avatar-modal h2{margin:0 0 12px}
.avatar-choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
.avatar-choice{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.16);border-radius:16px;padding:12px;cursor:pointer}
.avatar-choice.selected{border-color:#f59e0b;background:rgba(245,158,11,.16)}
.avatar-choice img{width:92px;height:92px;object-fit:cover;image-rendering:pixelated;border-radius:16px;background:#020617}
.avatar-choice b{display:block;margin-top:8px}
.nickname-input{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:#020617;color:white;font-size:16px;text-align:center}
@media(max-width:900px){
  .game-hud{grid-template-columns:1fr;gap:6px}
  .hud-actions{justify-content:center}
  .resource-chip{font-size:15px}
}


/* UI 2.5 visual polish */
.hud-profile{position:relative;overflow:hidden}
.hud-title{font-size:11px;color:#93c5fd;font-weight:800;margin-top:2px}
.hud-exp{position:absolute;left:66px;right:58px;bottom:8px;height:7px;background:rgba(15,23,42,.85);border:1px solid rgba(148,163,184,.28);border-radius:999px;overflow:hidden}
.hud-exp-fill{height:100%;width:0%;background:linear-gradient(90deg,#38bdf8,#3b82f6,#a78bfa);box-shadow:0 0 10px rgba(56,189,248,.65)}
.hud-exp-text{position:absolute;right:58px;bottom:17px;font-size:10px;color:#cbd5e1;font-weight:800}

.fish-card.rarity-uncommon{filter:drop-shadow(0 0 6px rgba(34,197,94,.32))}
.fish-card.rarity-rare{filter:drop-shadow(0 0 7px rgba(59,130,246,.48))}
.fish-card.rarity-epic{filter:drop-shadow(0 0 8px rgba(168,85,247,.55));animation:epicGlow 2.4s ease-in-out infinite}
.fish-card.rarity-legend{filter:drop-shadow(0 0 10px rgba(250,204,21,.7));animation:legendGlow 2.1s ease-in-out infinite}
@keyframes epicGlow{0%,100%{transform:translateY(0);filter:drop-shadow(0 0 6px rgba(168,85,247,.45))}50%{transform:translateY(-1px);filter:drop-shadow(0 0 13px rgba(216,180,254,.8))}}
@keyframes legendGlow{0%,100%{transform:translateY(0) scale(1);filter:drop-shadow(0 0 8px rgba(250,204,21,.55))}50%{transform:translateY(-1px) scale(1.02);filter:drop-shadow(0 0 18px rgba(250,204,21,.95))}}

.location-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.location-pill{font-size:10px;font-weight:900;padding:3px 6px;border-radius:999px;background:rgba(15,23,42,.72);border:1px solid rgba(148,163,184,.25);color:#cbd5e1}
.location-pill.safe{color:#86efac}.location-pill.warn{color:#fbbf24}.location-pill.danger{color:#f87171}

.scene-title-badge{position:absolute;left:14px;top:14px;z-index:8;background:rgba(2,6,23,.68);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:900;backdrop-filter:blur(4px)}
.scene-time-badge{position:absolute;right:14px;top:14px;z-index:8;background:rgba(2,6,23,.68);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:900;color:#fde68a;backdrop-filter:blur(4px)}
.scene-idle-text{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:8;background:rgba(2,6,23,.7);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:900;color:#facc15;white-space:nowrap;backdrop-filter:blur(4px)}
.available-panel{margin:10px auto 0;max-width:520px;background:rgba(2,6,23,.48);border:1px solid rgba(148,163,184,.22);border-radius:14px;padding:8px}
.available-title{font-size:13px;font-weight:900;color:#facc15;margin-bottom:6px}
.available-fishes{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.available-mini{width:56px;height:46px;position:relative;background:rgba(15,23,42,.68);border:1px solid rgba(148,163,184,.22);border-radius:10px;display:grid;place-items:center}
.available-mini img{max-width:42px;max-height:30px;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(0 2px 3px rgba(0,0,0,.7))}
.available-mini.unknown img{filter:brightness(0);opacity:.55}
.available-mini span{position:absolute;right:3px;bottom:2px;font-size:10px;color:#facc15;font-weight:900;text-shadow:0 1px 2px #000}

.fish-detail-backdrop,.catch-popup-backdrop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.62);z-index:120;padding:16px}
.fish-detail-backdrop.show,.catch-popup-backdrop.show{display:flex}
.fish-detail-card,.catch-popup-card{width:min(420px,100%);background:linear-gradient(180deg,#0f172a,#020617);border:1px solid rgba(148,163,184,.35);border-radius:20px;padding:18px;box-shadow:0 24px 80px rgba(0,0,0,.55);position:relative;overflow:hidden}
.fish-detail-card::before,.catch-popup-card::before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 35%);opacity:.5;animation:detailGlow 4s linear infinite;pointer-events:none}
@keyframes detailGlow{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.detail-card-preview{position:relative;width:132px;height:132px;margin:0 auto 10px}
.detail-card-preview .frame{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;image-rendering:pixelated;z-index:1}
.detail-card-preview .fish-img{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);width:78px;height:58px;object-fit:contain;image-rendering:pixelated;z-index:2}
.detail-title{font-size:24px;font-weight:900;margin:4px 0;color:#fff;text-shadow:0 2px 5px #000}
.detail-rarity{font-weight:900;margin-bottom:8px}
.detail-desc{color:#cbd5e1;line-height:1.5;font-size:14px;background:rgba(255,255,255,.06);border-radius:12px;padding:10px;margin:10px 0}
.detail-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.detail-stat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px;font-size:13px}
.catch-popup-card{animation:catchPop .32s ease-out both;text-align:center}
@keyframes catchPop{0%{transform:scale(.82);opacity:0}100%{transform:scale(1);opacity:1}}
.catch-popup-card.legend{box-shadow:0 0 60px rgba(250,204,21,.45),0 24px 80px rgba(0,0,0,.55)}
.catch-reward{font-size:14px;color:#facc15;font-weight:900;margin-top:8px}
.screen-shake{animation:screenShake .35s linear both}
@keyframes screenShake{0%,100%{transform:translate(0,0)}20%{transform:translate(-5px,2px)}40%{transform:translate(4px,-2px)}60%{transform:translate(-3px,-1px)}80%{transform:translate(3px,2px)}}

.bottom-tabs{position:fixed;left:0;right:0;bottom:0;z-index:20;display:grid;grid-template-columns:repeat(4,1fr);background:#020617;border-top:1px solid rgba(255,255,255,.16);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
.tab-btn{background:transparent;color:#d1d5db;margin:0;padding:8px 2px;border-radius:14px;font-size:12px;line-height:1.25}
.tab-btn.active{background:#f59e0b;color:#111827}

body.playing-mini{overflow:hidden}
body.playing-mini h1,
body.playing-mini .top-bar,
body.playing-mini .quick-stats,
body.playing-mini #locationBox,
body.playing-mini #pond,
body.playing-mini #normalControls{display:none!important}
body.playing-mini .wrap{padding:4px}
body.playing-mini #miniGameBox{display:block!important;margin-top:4px}
body.playing-mini #fishGame{height:calc(100vh - 165px);min-height:430px}
body.playing-mini #track{height:calc(100vh - 205px);min-height:390px}
body.playing-mini #fishSprite{left:14px}
body.playing-mini #holdBtn{position:fixed;left:12px;right:12px;bottom:118px;z-index:30;height:48px}


body.playing-mini #miniStatus{
  display:inline-block;
  background:rgba(15,23,42,.78);
  border:1px solid rgba(255,255,255,.16);
  border-radius:999px;
  padding:8px 14px;

  function clamp(n,min,max){return Math.max(min,Math.min(max,n))}
  function renderLab(){
    const fill=labEl('lab14ProgressFill'),pt=labEl('lab14ProgressText'),tt=labEl('lab14TimeText'),mt=labEl('lab14MoodText'),ct=labEl('lab14ControlText'),fish=labEl('lab14Fish'),tf=labEl('lab14TensionFill'),tx=labEl('lab14TensionText'),btn=labEl('lab14HoldBtn'),arena=labEl('lab14Arena');
    if(!lab){
      if(fill)fill.style.width='0%';if(pt)pt.textContent='0%';if(tt)tt.textContent='0.0초';if(mt)mt.textContent='대기';if(ct)ct.textContent='대기';if(tf)tf.style.width='50%';if(tx)tx.textContent='50%';if(btn)btn.classList.remove('holding');
      if(arena)arena.classList.remove('lab14-safe','lab14-danger','lab14-break','lab14-tired','lab14-resist','lab14-escape','lab14-frenzy');
      return;
    }
    const pct=clamp(lab.progress,0,100), tension=clamp(lab.tension,0,100);
    if(fill)fill.style.width=pct+'%';
    if(pt)pt.textContent=Math.floor(pct)+'%';
    if(tf)tf.style.width=tension+'%';
    if(tx)tx.textContent=Math.floor(tension)+'%';
    if(tt)tt.textContent=Math.max(0,lab.left).toFixed(1)+'초';
    if(mt)mt.textContent=(STATE_INFO[lab.state]?.label||lab.state||'대기');
    if(ct)ct.textContent=lab.reeling?'감는 중':'풀어줌';
    if(btn)btn.classList.toggle('holding',!!lab.reeling);
    if(arena){
      arena.classList.toggle('lab14-safe',isSafeTension());
      arena.classList.toggle('lab14-tired',lab.state==='tired');
      arena.classList.toggle('lab14-resist',lab.state==='resist');
      arena.classList.toggle('lab14-escape',lab.state==='escape');
      arena.classList.toggle('lab14-frenzy',lab.state==='frenzy');
    }
    if(fish){
      fish.textContent=lab.cfg.icon;
      fish.style.left=clamp(lab.fishPos,18,86)+'%';
      const scale=lab.state==='frenzy'?1.34:lab.state==='resist'?1.22:lab.state==='escape'?1.12:1;
      const rot=lab.state==='turn'?14:lab.state==='frenzy'?(Math.sin(Date.now()/60)*12):0;
      fish.style.transform=`translate(-50%,-50%) scale(${scale}) rotate(${rot}deg)`;
    }
  }
  function pickState(){
    const pool=[];
    if(labChecked('lab14TiredToggle',true))pool.push('tired');
    if(labChecked('lab14ResistToggle',true))pool.push('resist','brace');
    if(labChecked('lab14EscapeToggle',true))pool.push('escape','turn');
    if(labChecked('lab14FrenzyToggle',true)&&lab.cfg.frenzy&&lab.left<lab.cfg.time*.58)pool.push('frenzy');
    if(!pool.length)pool.push('brace');
    return pool[Math.floor(Math.random()*pool.length)];
  }
  function newState(force){
    if(!lab)return;
    const state=force||pickState();
    lab.state=state;
    const [minGap,maxGap]=lab.cfg.stateGap||[1,1.5];
    lab.stateTime=(state==='frenzy'?1.2:.85)+Math.random()*(state==='frenzy'?.55:.65);
    lab.stateTimer=minGap+Math.random()*(maxGap-minGap);
    if(state==='turn'){lab.dir*=-1;lab.tension+=Math.random()>.5?18:-14;}
    if(state==='resist'||state==='frenzy'){
      const arena=labEl('lab14Arena');
      if(arena){arena.classList.remove('lab14-danger');void arena.offsetWidth;arena.classList.add('lab14-danger');}
    }
    setLabMessage(`${lab.cfg.name} 상태: ${STATE_INFO[state]?.msg||state}`);
  }
  function loop(ts){
    if(!lab||!lab.running)return;
    if(!lab.last)lab.last=ts;
    const dt=Math.min(.05,(ts-lab.last)/1000);lab.last=ts;
    lab.left-=dt;lab.stateTimer-=dt;lab.stateTime-=dt;
    if(lab.stateTimer<=0||lab.stateTime<=0)newState();

    const power=labNum('lab14PowerInput',8);
    const tensionGain=labNum('lab14TensionInput',12);
    const safe=isSafeTension();
    let progressDelta=0,tensionDelta=0,fishDelta=0;

    if(lab.reeling){
      if(lab.state==='tired'){progressDelta+=(power*3.25)*dt;tensionDelta+=(tensionGain*.42)*dt;fishDelta-=8*dt;}
      else if(lab.state==='resist'){progressDelta+=(power*.25)*dt;tensionDelta+=(tensionGain*3.35)*dt;fishDelta-=2*dt;}
      else if(lab.state==='escape'){progressDelta+=(power*1.28)*dt;tensionDelta+=(tensionGain*1.25)*dt;fishDelta-=6*dt;}
      else if(lab.state==='frenzy'){progressDelta+=(power*3.8)*dt;tensionDelta+=(tensionGain*3.1)*dt;fishDelta-=11*dt;}
      else if(lab.state==='brace'){progressDelta+=(safe?power*2.0:power*.7)*dt;tensionDelta+=(tensionGain*.9)*dt;fishDelta-=4.2*dt;}
      else {progressDelta+=(safe?power*1.8:power*.65)*dt;tensionDelta+=(tensionGain*1.05)*dt;fishDelta-=4.5*dt;}
    }else{
      if(lab.state==='tired'){progressDelta-=lab.cfg.baseDecay*.25*dt;tensionDelta-=lab.cfg.tensionLeak*1.15*dt;fishDelta+=lab.cfg.escape*.35*dt;}
      else if(lab.state==='resist'){progressDelta-=lab.cfg.baseDecay*.35*dt;tensionDelta-=lab.cfg.tensionLeak*1.6*dt;fishDelta+=lab.cfg.escape*.25*dt;}
      else if(lab.state==='escape'){progressDelta-=lab.cfg.baseDecay*2.35*dt;tensionDelta-=lab.cfg.tensionLeak*.9*dt;fishDelta+=lab.cfg.escape*1.8*dt;}
      else if(lab.state==='frenzy'){progressDelta-=lab.cfg.baseDecay*1.35*dt;tensionDelta-=lab.cfg.tensionLeak*1.25*dt;fishDelta+=lab.cfg.escape*1.4*dt;}
      else {progressDelta-=lab.cfg.baseDecay*dt;tensionDelta-=lab.cfg.tensionLeak*dt;fishDelta+=lab.cfg.escape*.75*dt;}
    }

    if(safe){progressDelta+=(lab.reeling?2.2:.45)*dt;}
    lab.progress+=progressDelta;
    lab.tension+=tensionDelta;
    lab.fishPos+=fishDelta;
    lab.fishPos+=lab.dir*(lab.cfg.run+lab.cfg.jitter*Math.random())*dt*4;
    if(lab.fishPos>86){lab.fishPos=86;lab.dir=-1;lab.tension-=3;lab.progress-=1.5;}
    if(lab.fishPos<18){lab.fishPos=18;lab.dir=1;lab.tension+=4;}

    if(lab.tension>=100){finishLab(false,'줄이 끊어졌습니다! 저항/광폭화 때는 떼야 합니다.');return;}
    if(lab.tension<=0){finishLab(false,'줄이 풀려 물고기가 도망갔습니다! 도주 중에는 짧게 감아야 합니다.');return;}
    if(lab.progress>=lab.cfg.target){finishLab(true);return;}
    if(lab.progress<=0||lab.left<=0){finishLab(false,lab.left<=0?'시간 초과!':'포획 게이지가 사라졌습니다!');return;}
    renderLab();lab.raf=requestAnimationFrame(loop);
  }
  function finishLab(success,reason){
    if(!lab)return;
    const arena=labEl('lab14Arena');
    if(!success&&arena){arena.classList.remove('lab14-break');void arena.offsetWidth;arena.classList.add('lab14-break')}
    lab.running=false;if(lab.raf)cancelAnimationFrame(lab.raf);
    const name=lab.cfg.name;
    renderLab();
    if(success){setLabResult(`SUCCESS! ${name} 포획`, '#86efac');setLabMessage('성공! 지침/저항/도주/광폭 상태를 보고 감을지 말지 판단하는 방식입니다.');}
    else{setLabResult(`FAILED! ${name} 도주`, '#f87171');setLabMessage(reason||'실패했습니다. 상태를 보고 누름/뗌을 조절해야 합니다.');}
    lab=null;renderLab();
  }
  window.startFishingLab=function(type){
    if(!fishing?.adminMode){shop20Toast?.('관리자 전용','상점 3.0을 7번 눌러 관리자 모드를 켜주세요.');return;}
    const cfg=LAB_TYPES[type]||LAB_TYPES.easy;
    lab={cfg,running:true,progress:24,tension:50,left:cfg.time,fishPos:72,dir:Math.random()>.5?1:-1,state:'시작',stateTimer:.25,stateTime:0,last:0,raf:null,reeling:false};
    setLabResult('');setLabMessage(`${cfg.name} 테스트 시작! 상태 문구를 보고 감거나 떼세요.`);renderLab();newState('escape');lab.raf=requestAnimationFrame(loop);
  };
  window.labFishingHold=function(on){if(!lab||!lab.running)return;lab.reeling=!!on;renderLab();};
  window.labFishingReel=function(){window.labFishingHold(true);setTimeout(()=>window.labFishingHold(false),160);};
  window.stopFishingLab=function(){if(lab?.raf)cancelAnimationFrame(lab.raf);lab=null;setLabMessage('테스트가 중단되었습니다.');setLabResult('');renderLab();};
  document.addEventListener('keydown',e=>{if(e.code==='Space'&&lab?.running){window.labFishingHold(true);e.preventDefault();}});
  document.addEventListener('keyup',e=>{if(e.code==='Space'&&lab?.running){window.labFishingHold(false);e.preventDefault();}});
})();

/* ===============================
   UI 3.1 통합 기능 패치
================================ */
(function(){
  const RARITY_LABEL={common:'일반',uncommon:'고급',rare:'희귀',epic:'영웅',legend:'전설'};

  function ensureUi31State(){
    if(!fishing)return;
    fishing.exp ??= 0;
    fishing.nextExp ??= 100;
    fishing.level ??= fishing.rodLevel || 1;
    fishing.achievements ??= {};
    fishing.lockedFish ??= {};
    fishing.recentLog ??= [];
    fishing.todayEarned ??= 0;
    fishing.profile ??= {};
  }

  function toast(title,sub=''){
    let stack=document.querySelector('.ui-toast-stack');
    if(!stack){
      stack=document.createElement('div');
      stack.className='ui-toast-stack';
      document.body.appendChild(stack);
    }
    const el=document.createElement('div');
    el.className='ui-toast';
    el.innerHTML=`${title}${sub?`<small>${sub}</small>`:''}`;
    stack.appendChild(el);
    setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(20px)'},2600);
    setTimeout(()=>el.remove(),3150);
  }

  function getFishFrameUi31(fish){return RARITY_FRAMES[fish.rarity]||RARITY_FRAMES.common;}

  function addRecentLog(text,value=''){
    ensureUi31State();
    fishing.recentLog.unshift({text,value,time:Date.now()});
    fishing.recentLog=fishing.recentLog.slice(0,6);
  }

  function checkAchievementsUi31(fish){
    ensureUi31State();
    const a=fishing.achievements;
    const discovered=Object.keys(fishing.discovered||{}).length;
    const total=Object.keys(FISHES).length;
    const checks=[
      ['firstFish',(fishing.totalCaught||0)>=1,'첫 낚시 성공'],
      ['fish50',(fishing.totalCaught||0)>=50,'50마리 포획'],
      ['fish100',(fishing.totalCaught||0)>=100,'100마리 포획'],
      ['firstRare',['rare','epic','legend'].includes(fish?.rarity),'희귀 이상 첫 획득'],
      ['firstLegend',fish?.rarity==='legend','전설 첫 획득'],
      ['codex50',discovered/total>=.5,'도감 50% 달성']
    ];
    for(const [key,ok,label] of checks){
      if(ok&&!a[key]){a[key]=true;toast('🏆 업적 달성!',label)}
    }
  }

  function updateHudUi31(){
    ensureUi31State();
    const discovered=Object.keys(fishing.discovered||{}).length;
    const total=Object.keys(FISHES).length;
    const pct=Math.round(discovered/total*100);
    const book=document.getElementById('hudBookText');
    if(book)book.textContent=pct+'%';
    const trophy=document.getElementById('hudTrophyText');
    if(trophy)trophy.textContent=Object.values(fishing.achievements||{}).filter(Boolean).length;
    const expFill=document.getElementById('hudExpFill');
    if(expFill)expFill.style.width=Math.round((fishing.exp||0)/(fishing.nextExp||100)*100)+'%';
    const expText=document.getElementById('hudExpText');
    if(expText)expText.textContent=Math.round((fishing.exp||0)/(fishing.nextExp||100)*100)+'%';
  }

  function ensureUi31Modals(){
    if(document.getElementById('uiDetailModal'))return;
    document.body.insertAdjacentHTML('beforeend',`
      <div id="uiDetailModal" class="ui-modal-backdrop"><div class="ui-modal-card"><div id="uiDetailContent"></div></div></div>
      <div id="uiCatchModal" class="ui-modal-backdrop"><div id="uiCatchCard" class="ui-modal-card"><div id="uiCatchContent"></div></div></div>
    `);
    document.getElementById('uiDetailModal').onclick=e=>{if(e.target.id==='uiDetailModal')e.currentTarget.classList.remove('show')};
    document.getElementById('uiCatchModal').onclick=e=>{if(e.target.id==='uiCatchModal')e.currentTarget.classList.remove('show')};
  }

  window.openFishDetailUi31=function(invKeyOrFishKey){
    ensureUi31State();ensureUi31Modals();
    const parsed=parseInventoryKey(invKeyOrFishKey);
    const fishKey=FISHES[parsed.fishKey]?parsed.fishKey:invKeyOrFishKey;
    const sizeKey=FISHES[parsed.fishKey]?parsed.sizeKey:'normal';
    const fish=FISHES[fishKey];
    if(!fish)return;
    const invKey=FISHES[parsed.fishKey]?invKeyOrFishKey:getInventoryKey(fishKey,sizeKey);
    const count=fishing.inventory?.[invKey]||0;
    const locked=!!fishing.lockedFish[invKey];
    const price=getFishSellPrice(fishKey,sizeKey);
    document.getElementById('uiDetailContent').innerHTML=`
      <div class="ui-modal-fish fish-card rarity-${fish.rarity}">
        <img class="frame" src="${getFishFrameUi31(fish)}" alt="">
        <img class="fish" src="${fish.img}" alt="${fish.name}">
        ${locked?'<div class="lock-badge">🔒</div>':''}
      </div>
      <div class="ui-modal-title">${getSizedFishName(fishKey,sizeKey)}</div>
      <div class="ui-modal-sub">${RARITY_LABEL[fish.rarity]||fish.rarity}</div>
      <div class="detail-grid">
        <div class="detail-cell">판매가<b>${price}G</b></div>
        <div class="detail-cell">보유<b>${count}마리</b></div>
        <div class="detail-cell">속도<b>${fish.speed}</b></div>
        <div class="detail-cell">잠금<b>${locked?'ON':'OFF'}</b></div>
      </div>
      <div class="ui-modal-actions">
        <button class="secondary" onclick="toggleFishLockUi31('${invKey}')">${locked?'잠금 해제':'잠금'}</button>
        <button class="sell" onclick="sellFishFromDetailUi31('${invKey}')">1마리 판매</button>
      </div>
      <button class="secondary" onclick="document.getElementById('uiDetailModal').classList.remove('show')">닫기</button>
    `;
    document.getElementById('uiDetailModal').classList.add('show');
  };

  window.toggleFishLockUi31=function(invKey){
    ensureUi31State();
    fishing.lockedFish[invKey]=!fishing.lockedFish[invKey];
    toast(fishing.lockedFish[invKey]?'🔒 잠금 설정':'🔓 잠금 해제');
    render();
    openFishDetailUi31(invKey);
  };

  window.sellFishFromDetailUi31=async function(invKey){
    ensureUi31State();
    if(fishing.lockedFish[invKey]){toast('잠긴 물고기는 판매할 수 없습니다.');return;}
    document.getElementById('uiDetailModal').classList.remove('show');
    await window.sellFishAmount(invKey,1);
  };

  function showCatchRewardUi31(fishKey,sizeKey,expText=''){
    ensureUi31Modals();
    const fish=FISHES[fishKey];
    if(!fish)return;
    const modal=document.getElementById('uiCatchModal');
    const card=document.getElementById('uiCatchCard');
    const name=getSizedFishName(fishKey,sizeKey);
    card.className='ui-modal-card '+(fish.rarity==='legend'?'legend':'');
    document.getElementById('uiCatchContent').innerHTML=`
      <div class="ui-modal-fish fish-card rarity-${fish.rarity}">
        <img class="frame" src="${getFishFrameUi31(fish)}" alt="">
        <img class="fish" src="${fish.img}" alt="${name}">
      </div>
      <div class="ui-modal-title">${fish.rarity==='legend'?'⭐⭐⭐⭐⭐<br>':''}${name}</div>
      <div class="ui-modal-sub">${RARITY_LABEL[fish.rarity]||fish.rarity}${expText?` · ${expText}`:''}</div>
      <button onclick="document.getElementById('uiCatchModal').classList.remove('show')">확인</button>
    `;
    modal.classList.add('show');
  }

  function injectSideWidgetsUi31(){
    ensureUi31State();
    const bagPanel=document.querySelector('.bag-panel')||document.querySelector('#tabBag .box');
    if(!bagPanel)return;
    let widget=document.getElementById('uiBagLogWidget');
    if(!widget){
      widget=document.createElement('div');
      widget.id='uiBagLogWidget';
      widget.className='ui-side-widget';
      bagPanel.appendChild(widget);
    }
    const logs=(fishing.recentLog||[]).slice(0,5);
    widget.innerHTML=`<h3>최근 획득</h3>${logs.length?logs.map(l=>`<div class="ui-log-item"><span>${l.text}</span><b>${l.value||''}</b></div>`).join(''):'<div class="small">아직 기록이 없습니다.</div>'}<h3 style="margin-top:10px">오늘 수익</h3><div class="ui-log-item"><span>판매 수익</span><b>${fishing.todayEarned||0}G</b></div>`;
  }

  function patchInventoryCardsUi31(){
    ensureUi31State();
    const entries=typeof getSortedInventoryEntries==='function'?getSortedInventoryEntries():Object.entries(fishing?.inventory||{}).map(([key,count])=>({key,count}));
    const bind=(selector)=>{
      document.querySelectorAll(selector).forEach((card,idx)=>{
        const item=entries[idx];
        if(!item)return;
        const key=item.key;
        if(fishing.lockedFish?.[key])card.classList.add('locked-sale');
        card.onclick=()=>openFishDetailUi31(key);
      });
    };
    bind('#inventoryList .fish-card');
    bind('#inventoryPreviewList .fish-card');
  }

  const oldRender=render;
  render=function(){
    ensureUi31State();
    oldRender();
    updateHudUi31();
    injectSideWidgetsUi31();
    patchInventoryCardsUi31();
  };

  const oldSellAmount=window.sellFishAmount;
  window.sellFishAmount=async function(key,amount){
    ensureUi31State();
    if(fishing.lockedFish?.[key]){toast('잠긴 물고기는 판매할 수 없습니다.');return;}
    const beforeGold=fishing.gold||0;
    await oldSellAmount(key,amount);
    const earned=(fishing.gold||0)-beforeGold;
    if(earned>0){
      fishing.todayEarned=(fishing.todayEarned||0)+earned;
      toast('판매 완료',`${earned}G 획득`);
    }
    injectSideWidgetsUi31();
  };

  if(typeof sellAllFish==='function'){
    sellAllFish=async function(){
      ensureUi31State();
      let earn=0,sold=0;
      for(const [key,count] of Object.entries({...((fishing&&fishing.inventory)||{})})){
        if(fishing.lockedFish?.[key])continue;
        const parsed=parseInventoryKey(key);
        earn+=getFishSellPrice(parsed.fishKey,parsed.sizeKey)*count;
        sold+=count;
        delete fishing.inventory[key];
      }
      if(!sold){toast('판매할 물고기가 없습니다.','잠금 물고기는 제외됩니다.');return;}
      fishing.gold+=earn;
      fishing.totalEarned=(fishing.totalEarned||0)+earn;
      fishing.todayEarned=(fishing.todayEarned||0)+earn;
      toast(`물고기 ${sold}마리 판매`,`${earn}G 획득`);
      render();
      await saveGame();
    };
  }

  const oldFinish=finishFishing;
  finishFishing=async function(success){
    const beforeDiscovered={...(fishing?.discovered||{})};
    const fishKey=targetFishKey;
    const sizeKey=targetSizeKey;
    const fish=FISHES[fishKey];
    await oldFinish(success);
    if(success&&fish){
      const expText=`+${12+Math.round(fish.price/8)} EXP`;
      addRecentLog(getSizedFishName(fishKey,sizeKey),expText);
      if(!beforeDiscovered[fishKey])toast('📖 신규 도감 등록!',fish.name);
      checkAchievementsUi31(fish);
      // 기본 포획 팝업(showCatchPopup)만 사용합니다. 중복 보상 팝업은 표시하지 않습니다.
      updateHudUi31();
      await saveGame();
    }
  };
})();

async function renderBossRareDropLog(){
  try{

/* ===============================
   11.0 Accessory System
   - 장신구 인벤토리 / 3슬롯 장착
   - 보스 상자 장신구 드롭
   - 보스 딜/패턴 저항/전설/대형 확률 효과
================================ */
function ensureAccessoryState(){
  if(!fishing)return;
  fishing.accessories=fishing.accessories||{};
  fishing.accessoryEnhance=fishing.accessoryEnhance||{};
  fishing.equipment=fishing.equipment||{};
  fishing.equipment.accessories=fishing.equipment.accessories||{ring:null,necklace:null,relic:null};
  for(const slot of ['ring','necklace','relic']){
    const id=fishing.equipment.accessories[slot];
    if(id && !hasAccessoryOwned(id))fishing.equipment.accessories[slot]=null;
  }
}
function getAccessoryCount(id){const v=fishing?.accessories?.[id];return typeof v==='number'?v:Number(v?.count||0)}
function hasAccessoryOwned(id){return getAccessoryCount(id)>0}
function getAccessoryData(id){return ACCESSORY_ITEMS?.[id]||null}
function getAccessoryLevel(id){ensureAccessoryState();return Math.max(0,Math.min(10,Number(fishing.accessoryEnhance?.[id]||0)))}
function getAccessoryEnhanceMul(id){return 1+(getAccessoryLevel(id)*0.07)}
function getAccessoryEnhancedEffectValue(id,key){const a=getAccessoryData(id);return Number(a?.effects?.[key]||0)*getAccessoryEnhanceMul(id)}
function getAccessoryEnhanceCost(id){const a=getAccessoryData(id),lv=getAccessoryLevel(id),next=lv+1;if(!a||lv>=10)return null;const rarityMul={rare:1,epic:1.35,legend:1.9,mythic:2.7}[a.rarity]||1;let gold=Math.floor(4500*next*next*rarityMul);let token=0,tokenType=null;if(['kraken','leviathan','phoenix'].includes(a.set)){tokenType=a.set;token=Math.max(1,Math.ceil(next/2));}else{gold=Math.floor(gold*1.45)}const rate=[100,95,90,85,80,70,60,50,40,30][lv]||30;return {gold,token,tokenType,rate,next};}
function getAccessoryTokenName(type){return ({kraken:'크라켄 토큰',leviathan:'레비아탄 토큰',phoenix:'심해룡 토큰'}[type]||'보스 토큰')}
function getAccessoryEffectTextEnhanced(id){const a=getAccessoryData(id);if(!a)return '';const lv=getAccessoryLevel(id);if(!lv)return a.effect;const parts=[];for(const [k,v] of Object.entries(a.effects||{})){const val=v*(1+lv*.07);if(k==='bossDamage')parts.push(`보스 딜 +${Math.round(val*100)}%`);else if(k==='inkResist')parts.push(`먹물 지속시간 -${Math.round(val*100)}%`);else if(k==='stormResist')parts.push(`폭풍 효과 -${Math.round(val*100)}%`);else if(k==='reverseResist')parts.push(`교란 저항 +${Math.round(val*100)}%`);else if(k==='bigFishBonus')parts.push(`대형 물고기 확률 +${Math.round(val*100)}%`);else if(k==='goldBonus')parts.push(`골드 획득 +${Math.round(val*100)}%`);else if(k==='legendBonus')parts.push(`전설 확률 +${Number(val.toFixed(1))}%`);}
  return parts.join(' / ')||a.effect;
}
function getEquippedAccessoryIds(){ensureAccessoryState();return Object.values(fishing.equipment.accessories||{}).filter(Boolean)}
function getEquippedAccessories(){return getEquippedAccessoryIds().map(getAccessoryData).filter(Boolean)}
function getAccessorySetCount(setId){return getEquippedAccessories().filter(a=>a.set===setId).length}
function getAccessorySetBonusEffects(){
  const bonus={};
  for(const [setId,set] of Object.entries(ACCESSORY_SETS||{})){
    if(getAccessorySetCount(setId)>=2){
      for(const [k,v] of Object.entries(set.twoEffects||{}))bonus[k]=(bonus[k]||0)+Number(v||0);
    }
  }
  return bonus;
}
function hasAccessorySetImmune(pattern){
  return Object.entries(ACCESSORY_SETS||{}).some(([setId,set])=>set.immunePattern===pattern&&getAccessorySetCount(setId)>=3);
}
function getAccessoryEffectTotal(key){
  const base=getEquippedAccessoryIds().reduce((sum,id)=>sum+getAccessoryEnhancedEffectValue(id,key),0);
  const setBonus=getAccessorySetBonusEffects()[key]||0;
  return base+setBonus;
}
function getAccessoryBossDamageMul(){return 1+getAccessoryEffectTotal('bossDamage')}
function getAccessoryPatternResist(pattern){
  if(hasAccessorySetImmune(pattern))return 1;
  const map={ink:'inkResist',storm:'stormResist',reverse:'reverseResist'};
  return Math.max(0,Math.min(.85,getAccessoryEffectTotal(map[pattern]||'')));
}
function getAccessoryLegendBonus(){return getAccessoryEffectTotal('legendBonus')}
function getAccessoryBigFishBonus(){return getAccessoryEffectTotal('bigFishBonus')}
function getAccessoryGoldBonus(){return getAccessoryEffectTotal('goldBonus')}
function getAccessoryRarityLabel(r){return ({rare:'레어',epic:'에픽',legend:'전설',mythic:'신화'}[r]||r||'일반')}
function getAccessorySlotLabel(s){return ({ring:'💍 반지',necklace:'📿 목걸이',relic:'🧿 유물'}[s]||s)}

function addAccessory(id,count=1){

function pickBossAccessory(type,enhanced=false){
  const pool=ACCESSORY_DROPS?.[type]||ACCESSORY_DROPS.kraken;
  const list=pool.map(id=>ACCESSORY_ITEMS[id]).filter(Boolean);
  const weight={rare:70,epic:24,legend:6,mythic:1};
  const adjusted=list.map(a=>[a,weight[a.rarity]||20]);
  if(enhanced){for(const x of adjusted){if(x[0].rarity==='legend')x[1]*=1.6;if(x[0].rarity==='mythic')x[1]*=1.8;}}
  const total=adjusted.reduce((s,x)=>s+x[1],0);let r=Math.random()*total;
  for(const [a,w] of adjusted){r-=w;if(r<=0)return a;}
  return adjusted[0]?.[0];
}

(function(){
  const _getAccessoryLevel = typeof getAccessoryLevel==='function' ? getAccessoryLevel : null;
  getAccessoryLevel = function(id){
    if(!fishing) return 0;
    ensureAccessoryState?.();
    return Math.max(0,Math.min(10,Number(fishing.accessoryEnhance?.[id]||0)));
  };

  getEquippedAccessoryIds = function(){
    if(!fishing) return [];
    ensureAccessoryState?.();
    return Object.values(fishing.equipment?.accessories||{}).filter(Boolean);
  };

  getEquippedAccessories = function(){
    return getEquippedAccessoryIds().map(id=>ACCESSORY_ITEMS?.[id]).filter(Boolean);
  };

  getAccessorySetCount = function(setId){
    if(!fishing) return 0;
    return getEquippedAccessories().filter(a=>a?.set===setId).length;
  };

  getAccessorySetBonusEffects = function(){
    if(!fishing) return {};
    const bonus={};
    for(const [setId,set] of Object.entries(ACCESSORY_SETS||{})){
      if(getAccessorySetCount(setId)>=2){
        for(const [k,v] of Object.entries(set.twoEffects||{})) bonus[k]=(bonus[k]||0)+Number(v||0);
      }
    }
    return bonus;
  };

  hasAccessorySetImmune = function(pattern){
    if(!fishing) return false;
    return Object.entries(ACCESSORY_SETS||{}).some(([setId,set])=>set.immunePattern===pattern&&getAccessorySetCount(setId)>=3);
  };

  getAccessoryEffectTotal = function(key){
    if(!fishing) return 0;
    const base=getEquippedAccessoryIds().reduce((sum,id)=>sum+(typeof getAccessoryEnhancedEffectValue==='function'?getAccessoryEnhancedEffectValue(id,key):0),0);
    const setBonus=getAccessorySetBonusEffects()[key]||0;
    return base+setBonus;
  };

  const _getAccessorySummaryHtml = typeof getAccessorySummaryHtml==='function' ? getAccessorySummaryHtml : null;
  getAccessorySummaryHtml = function(){
    if(!fishing) return '장착 효과 없음';
    try{return _getAccessorySummaryHtml ? _getAccessorySummaryHtml() : '장착 효과 없음';}
    catch(e){console.warn('accessory summary failed',e);return '장착 효과 없음';}
  };

  const _renderInventory = typeof renderInventory==='function' ? renderInventory : null;
  renderInventory = function(){
    if(!fishing) return;
    try{return _renderInventory && _renderInventory.apply(this,arguments);}catch(e){console.error('가방 렌더 오류',e);}
  };

  const _renderInventoryPreview = typeof renderInventoryPreview==='function' ? renderInventoryPreview : null;
  renderInventoryPreview = function(){
    if(!fishing) return;
    try{return _renderInventoryPreview && _renderInventoryPreview.apply(this,arguments);}catch(e){console.error('가방 미리보기 렌더 오류',e);}
  };

  document.addEventListener('click',function(e){
    const bagBtn=e.target.closest?.('[data-bag-filter]');
    if(bagBtn){
      e.preventDefault();
      e.stopImmediatePropagation();
      const type=bagBtn.dataset.bagFilter||'all';
      currentBagPreviewFilter=type;
      document.querySelectorAll('[data-bag-filter]').forEach(b=>b.classList.toggle('active',b.dataset.bagFilter===type));
      renderInventoryPreview?.();
      renderInventory?.();
      return;
    }

    const auctionBtn=e.target.closest?.('.auction43-type-tabs button');
    if(auctionBtn){
      e.preventDefault();
      e.stopImmediatePropagation();
      const txt=(auctionBtn.textContent||'').trim();
      const map={'전체':'all','물고기':'fish','낚싯대':'rod','프레임':'frame','토큰':'token','상자':'chest','장신구':'accessory'};
      const type=map[txt]||auctionBtn.dataset?.auctionFilter||'all';
      window.__auction43Filter=type;
      window.__auction44Filter=type;
      document.querySelectorAll('.auction43-type-tabs button').forEach(b=>b.classList.toggle('active',b===auctionBtn));
      if(typeof loadMulti==='function') loadMulti();
      else if(typeof window.loadMulti==='function') window.loadMulti();
      return;
    }
  },true);
})();


/* ===============================
   Patch 13.2.2 Startup Inventory Null Hardfix
   - fishing 초기화 전 inventory 참조 차단
   - 렌더/필터/멀티 점수 계산 안전화
================================ */
(function(){
  const safeRun=(fn,fallback)=>function(){
    if(!window.fishing && typeof fishing==='undefined') return fallback;
    if(typeof fishing!=='undefined' && !fishing) return fallback;
    try{return fn&&fn.apply(this,arguments);}catch(e){
      if(String(e?.message||'').includes('inventory')){console.warn('inventory null guard',e);return fallback;}
      throw e;
    }
  };
  if(typeof calcMultiScore==='function'){
    const baseCalc=calcMultiScore;
    calcMultiScore=function(){if(!fishing)return 0;return baseCalc();};
  }
  if(typeof render==='function'){
    const baseRender=render;
    render=function(){if(!fishing)return;return baseRender.apply(this,arguments);};
  }
})();

</script>
