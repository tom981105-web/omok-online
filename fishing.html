<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>낚시게임</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#082f49;color:white;text-align:center;padding-bottom:82px}
h1{margin:10px 0 4px;font-size:26px}
h2{margin:8px 0}
button{padding:10px 12px;border-radius:12px;border:none;font-size:14px;margin:4px;background:#f59e0b;color:#111;font-weight:bold;cursor:pointer}
button.secondary{background:#374151;color:white}
button.sell{background:#22c55e;color:#052e16}
button.bite{background:#ef4444;color:white;animation:pulse .75s infinite}
button:disabled{opacity:.45;cursor:not-allowed}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}

.wrap{max-width:900px;margin:0 auto;padding:6px}
.box{background:rgba(255,255,255,.1);border-radius:18px;padding:10px;margin:7px 0}
.hidden{display:none!important}
.status{color:#facc15;font-weight:bold;line-height:1.45;margin:8px 0}
.small{font-size:13px;color:#d1d5db;line-height:1.45}
.top-bar{display:flex;justify-content:space-between;align-items:center;gap:6px}
.top-bar .small{text-align:left;flex:1}

.quick-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0}
.quick-stat{background:rgba(255,255,255,.1);border-radius:12px;padding:7px 3px;font-size:12px;line-height:1.35}
.quick-stat b{font-size:16px}

.tab-page{display:none}
.tab-page.active{display:block}

.location-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:8px 0}
.location-card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:8px 4px;font-size:12px;cursor:pointer}
.location-card.active{background:#f59e0b;color:#111827;font-weight:bold}
.location-card.locked{opacity:.42;filter:grayscale(1)}
.location-card .lv{font-size:11px;color:inherit;opacity:.8}
.location-thumb{width:100%;height:90px;object-fit:cover;border-radius:10px;margin-bottom:6px;image-rendering:pixelated}

#pond{position:relative;height:260px;border-radius:22px;overflow:hidden;border:4px solid rgba(255,255,255,.25);background-size:cover;background-position:center;background-repeat:no-repeat;display:block;background-color:#0f172a;isolation:isolate}
#pond.active-scene{display:block}
#pond::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at center,rgba(255,255,255,.06),rgba(0,0,0,.24) 64%,rgba(0,0,0,.45));z-index:0;pointer-events:none}
#pond::after{content:"";position:absolute;inset:-20%;background:radial-gradient(circle,rgba(255,255,255,.35) 0 1px,transparent 2px) 10% 80%/90px 120px,radial-gradient(circle,rgba(125,211,252,.22) 0 1px,transparent 3px) 70% 85%/130px 160px;opacity:.45;z-index:1;pointer-events:none;animation:sceneSparkle 8s linear infinite}
@keyframes sceneSparkle{0%{transform:translateY(20px)}100%{transform:translateY(-40px)}}
#floatBobber{position:absolute;left:50%;top:42%;width:16px;height:34px;transform:translate(-50%,-50%);display:none;z-index:6}
#floatBobber::before{content:"";display:block;width:16px;height:16px;background:#ef4444;border-radius:50% 50% 0 0}
#floatBobber::after{content:"";display:block;width:16px;height:16px;background:#f8fafc;border-radius:0 0 50% 50%}
#floatBobber.waiting{display:block;animation:bobberWait 1.8s infinite ease-in-out}
#floatBobber.biteReady{display:block;animation:bobberBite .28s infinite ease-in-out}
@keyframes bobberWait{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-42%)}}
@keyframes bobberBite{0%,100%{transform:translate(-50%,-44%)}50%{transform:translate(-50%,-20%)}}


#bobberRipple{
  position:absolute;
  left:50%;
  top:42%;
  width:18px;
  height:18px;
  border:2px solid rgba(255,255,255,.55);
  border-radius:50%;
  transform:translate(-50%,-50%);
  display:none;
  pointer-events:none;
  animation:rippleLoop 1.6s infinite ease-out;
  z-index:5;
}
@keyframes rippleLoop{
  0%{width:14px;height:14px;opacity:.75}
  100%{width:76px;height:28px;opacity:0}
}
#splashEffect{
  position:absolute;
  left:50%;
  top:42%;
  width:80px;
  height:40px;
  transform:translate(-50%,-50%);
  display:none;
  pointer-events:none;
  z-index:7;
}
#splashEffect::before,
#splashEffect::after{
  content:"";
  position:absolute;
  width:10px;
  height:10px;
  background:rgba(255,255,255,.9);
  border-radius:50%;
  top:16px;
  animation:splashPop .55s ease-out forwards;
}
#splashEffect::before{left:20px}
#splashEffect::after{right:20px}
@keyframes splashPop{
  0%{transform:translateY(0) scale(.7);opacity:1}
  100%{transform:translateY(-28px) scale(1.4);opacity:0}
}

#fishShadow{position:absolute;left:50%;top:62%;z-index:4;width:90px;height:28px;background:rgba(0,0,0,.35);border-radius:50%;transform:translate(-50%,-50%);filter:blur(2px);display:none;animation:shadowMove 2.4s infinite ease-in-out}
@keyframes shadowMove{0%{transform:translate(-55%,-50%) scale(1)}50%{transform:translate(-45%,-45%) scale(1.08)}100%{transform:translate(-55%,-50%) scale(1)}}

.catch-result{margin-top:8px}
.catch-result img{width:56px;height:42px;object-fit:contain;image-rendering:pixelated;vertical-align:middle;margin-right:6px}

#fishGame{
  height:260px;
  background:#0f172a;
  border-radius:18px;
  position:relative;
  overflow:hidden;
  border:3px solid #64748b;
  isolation:isolate;
}
#fishGame::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:var(--mini-bg);
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  image-rendering:pixelated;
  filter:brightness(.48) blur(1px);
  opacity:.72;
  z-index:0;
}
#fishGame::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(255,255,255,.08) 0%, rgba(0,0,0,.15) 35%, rgba(0,0,0,.58) 100%),
    linear-gradient(90deg, rgba(15,23,42,.55), rgba(15,23,42,.08), rgba(15,23,42,.55));
  z-index:1;
  pointer-events:none;
}
.mini-bubbles{
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
  opacity:.55;
  background:
    radial-gradient(circle, rgba(255,255,255,.5) 0 2px, transparent 3px) 18% 85%/120px 160px,
    radial-gradient(circle, rgba(255,255,255,.35) 0 1.5px, transparent 3px) 72% 92%/90px 140px,
    radial-gradient(circle, rgba(147,197,253,.35) 0 2px, transparent 4px) 48% 88%/150px 190px;
  animation:bubbleFloat 5.5s linear infinite;
}
@keyframes bubbleFloat{
  0%{background-position:18% 105%,72% 112%,48% 108%}
  100%{background-position:18% -20%,72% -15%,48% -25%}
}
#track{position:absolute;left:50%;top:12px;transform:translateX(-50%);width:84px;height:230px;background:rgba(30,41,59,.72);border-radius:999px;border:2px solid rgba(203,213,225,.75);box-shadow:0 0 30px rgba(59,130,246,.18);z-index:3}
#catchBar{position:absolute;left:10px;width:60px;height:60px;background:rgba(34,197,94,.72);border:2px solid #bbf7d0;border-radius:12px;box-shadow:0 0 18px rgba(34,197,94,.32);z-index:4}
#fishSprite{position:absolute;left:14px;top:112px;width:56px;height:auto;object-fit:contain;image-rendering:pixelated;pointer-events:none;z-index:5}
#fishSprite.unknown{filter:brightness(0);opacity:.65}

#verticalProgress{
  position:absolute;
  left:8px;
  top:14px;
  bottom:14px;
  width:9px;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.25);
  border-radius:999px;
  overflow:hidden;
  z-index:6;
  box-shadow:inset 0 0 8px rgba(0,0,0,.35);
}
#verticalProgressFill{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:0%;
  background:#ef4444;
  border-radius:999px;
  transition:height .08s linear, background .18s linear, box-shadow .18s linear;
}
#verticalProgressFill.ready{
  box-shadow:0 0 16px rgba(34,197,94,.9);
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fish-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:rgba(255,255,255,.1);border-radius:12px;padding:9px;margin:5px 0;text-align:left}
.sell-control{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.qty-box{display:flex;align-items:center;gap:4px}
.qty-btn{width:32px;height:32px;padding:0;border-radius:9px;background:#374151;color:white}
.qty-num{min-width:34px;text-align:center;font-weight:bold}
.compact-shop{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.book-fish-img{width:42px;height:32px;object-fit:contain;image-rendering:pixelated;vertical-align:middle;margin-right:6px}
.undiscovered{filter:brightness(0);opacity:.5}
.r-common{color:#e5e7eb}
.r-uncommon{color:#86efac}
.r-rare{color:#93c5fd}
.r-epic{color:#d8b4fe}
.r-legend{color:#facc15}


.fish-card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(96px,1fr));
  gap:10px;
  justify-items:center;
}
.fish-card{
  position:relative;
  width:96px;
  height:96px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  user-select:none;
  transition:transform .12s ease, filter .12s ease;
}
.fish-card:active{transform:scale(.96)}
.fish-card .frame{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  image-rendering:pixelated;
  z-index:2;
  pointer-events:none;
}

.fish-card .fish-img{
  position:absolute;
  left:50%;
  top:42%;
  transform:translate(-50%,-50%);

  width:58px;
  height:44px;

  object-fit:contain;
  image-rendering:pixelated;

  z-index:4;
}
.fish-card .fish-name{
  position:absolute;
  left:8px;
  right:8px;
  bottom:12px;
  font-size:12px;
  font-weight:800;
  color:white;
  text-shadow:0 2px 4px #000,0 0 4px #000;
  z-index:4;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.fish-card .fish-count{
  position:absolute;
  right:10px;
  top:12px;
  font-size:12px;
  font-weight:900;
  color:#fff;
  text-shadow:0 2px 4px #000,0 0 4px #000;
  z-index:4;
}
.fish-card .fish-price{
  position:absolute;
  left:8px;
  top:12px;
  font-size:11px;
  font-weight:800;
  color:#facc15;
  text-shadow:0 2px 4px #000;
  z-index:4;
}
.fish-card.locked .fish-img{filter:brightness(0);opacity:.45}
.fish-card.locked{opacity:.82;cursor:default}
.fish-card.locked::after{
  content:"🔒";
  position:absolute;
  left:50%;
  top:43%;
  transform:translate(-50%,-50%);
  font-size:20px;
  z-index:5;
  text-shadow:0 2px 4px #000;
}


/* UI 2.0 icon/avatar patch */
.game-hud{
  display:grid;
  grid-template-columns:minmax(220px,1.2fr) minmax(280px,1fr) auto;
  gap:10px;
  align-items:center;
  margin:8px 0;
}
.hud-card{
  background:linear-gradient(180deg,rgba(15,23,42,.92),rgba(2,6,23,.82));
  border:1px solid rgba(148,163,184,.35);
  border-radius:14px;
  padding:9px 12px;
  display:flex;
  align-items:center;
  gap:10px;
  min-height:58px;
  box-shadow:0 8px 22px rgba(0,0,0,.22);
}
.hud-avatar{width:44px;height:44px;border-radius:12px;object-fit:cover;image-rendering:pixelated;border:1px solid rgba(255,255,255,.3);background:#0f172a}
.hud-info{text-align:left;line-height:1.25;min-width:0}
.hud-name{font-weight:900;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hud-sub{font-size:12px;color:#cbd5e1}
.hud-level{margin-left:auto;font-weight:900;color:#facc15;background:rgba(250,204,21,.1);padding:6px 10px;border-radius:999px}
.hud-resources{justify-content:space-around}
.resource-chip{display:flex;align-items:center;gap:8px;font-weight:900;font-size:18px;padding:0 8px;border-right:1px solid rgba(255,255,255,.12)}
.resource-chip:last-child{border-right:0}
.icon-img{width:24px;height:24px;object-fit:contain;image-rendering:pixelated}
.hud-actions{justify-content:flex-end}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-width:48px;height:42px;padding:8px 10px;background:#374151;color:white}
.icon-btn img{width:22px;height:22px;object-fit:contain;image-rendering:pixelated}
.avatar-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.avatar-modal-backdrop.show{display:flex}
.avatar-modal{width:min(460px,100%);background:#0f172a;border:1px solid rgba(148,163,184,.4);border-radius:20px;padding:18px;box-shadow:0 20px 70px rgba(0,0,0,.45)}
.avatar-modal h2{margin:0 0 12px}
.avatar-choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
.avatar-choice{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.16);border-radius:16px;padding:12px;cursor:pointer}
.avatar-choice.selected{border-color:#f59e0b;background:rgba(245,158,11,.16)}
.avatar-choice img{width:92px;height:92px;object-fit:cover;image-rendering:pixelated;border-radius:16px;background:#020617}
.avatar-choice b{display:block;margin-top:8px}
.nickname-input{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:#020617;color:white;font-size:16px;text-align:center}
@media(max-width:900px){
  .game-hud{grid-template-columns:1fr;gap:6px}
  .hud-actions{justify-content:center}
  .resource-chip{font-size:15px}
}


/* UI 2.5 visual polish */
.hud-profile{position:relative;overflow:hidden}
.hud-title{font-size:11px;color:#93c5fd;font-weight:800;margin-top:2px}
.hud-exp{position:absolute;left:66px;right:58px;bottom:8px;height:7px;background:rgba(15,23,42,.85);border:1px solid rgba(148,163,184,.28);border-radius:999px;overflow:hidden}
.hud-exp-fill{height:100%;width:0%;background:linear-gradient(90deg,#38bdf8,#3b82f6,#a78bfa);box-shadow:0 0 10px rgba(56,189,248,.65)}
.hud-exp-text{position:absolute;right:58px;bottom:17px;font-size:10px;color:#cbd5e1;font-weight:800}

.fish-card.rarity-uncommon{filter:drop-shadow(0 0 6px rgba(34,197,94,.32))}
.fish-card.rarity-rare{filter:drop-shadow(0 0 7px rgba(59,130,246,.48))}
.fish-card.rarity-epic{filter:drop-shadow(0 0 8px rgba(168,85,247,.55));animation:epicGlow 2.4s ease-in-out infinite}
.fish-card.rarity-legend{filter:drop-shadow(0 0 10px rgba(250,204,21,.7));animation:legendGlow 2.1s ease-in-out infinite}
@keyframes epicGlow{0%,100%{transform:translateY(0);filter:drop-shadow(0 0 6px rgba(168,85,247,.45))}50%{transform:translateY(-1px);filter:drop-shadow(0 0 13px rgba(216,180,254,.8))}}
@keyframes legendGlow{0%,100%{transform:translateY(0) scale(1);filter:drop-shadow(0 0 8px rgba(250,204,21,.55))}50%{transform:translateY(-1px) scale(1.02);filter:drop-shadow(0 0 18px rgba(250,204,21,.95))}}

.location-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.location-pill{font-size:10px;font-weight:900;padding:3px 6px;border-radius:999px;background:rgba(15,23,42,.72);border:1px solid rgba(148,163,184,.25);color:#cbd5e1}
.location-pill.safe{color:#86efac}.location-pill.warn{color:#fbbf24}.location-pill.danger{color:#f87171}

.scene-title-badge{position:absolute;left:14px;top:14px;z-index:8;background:rgba(2,6,23,.68);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:900;backdrop-filter:blur(4px)}
.scene-time-badge{position:absolute;right:14px;top:14px;z-index:8;background:rgba(2,6,23,.68);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:900;color:#fde68a;backdrop-filter:blur(4px)}
.scene-idle-text{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:8;background:rgba(2,6,23,.7);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:900;color:#facc15;white-space:nowrap;backdrop-filter:blur(4px)}
.available-panel{margin:10px auto 0;max-width:520px;background:rgba(2,6,23,.48);border:1px solid rgba(148,163,184,.22);border-radius:14px;padding:8px}
.available-title{font-size:13px;font-weight:900;color:#facc15;margin-bottom:6px}
.available-fishes{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.available-mini{width:56px;height:46px;position:relative;background:rgba(15,23,42,.68);border:1px solid rgba(148,163,184,.22);border-radius:10px;display:grid;place-items:center}
.available-mini img{max-width:42px;max-height:30px;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(0 2px 3px rgba(0,0,0,.7))}
.available-mini.unknown img{filter:brightness(0);opacity:.55}
.available-mini span{position:absolute;right:3px;bottom:2px;font-size:10px;color:#facc15;font-weight:900;text-shadow:0 1px 2px #000}

.fish-detail-backdrop,.catch-popup-backdrop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.62);z-index:120;padding:16px}
.fish-detail-backdrop.show,.catch-popup-backdrop.show{display:flex}
.fish-detail-card,.catch-popup-card{width:min(420px,100%);background:linear-gradient(180deg,#0f172a,#020617);border:1px solid rgba(148,163,184,.35);border-radius:20px;padding:18px;box-shadow:0 24px 80px rgba(0,0,0,.55);position:relative;overflow:hidden}
.fish-detail-card::before,.catch-popup-card::before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 35%);opacity:.5;animation:detailGlow 4s linear infinite;pointer-events:none}
@keyframes detailGlow{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.detail-card-preview{position:relative;width:132px;height:132px;margin:0 auto 10px}
.detail-card-preview .frame{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;image-rendering:pixelated;z-index:1}
.detail-card-preview .fish-img{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);width:78px;height:58px;object-fit:contain;image-rendering:pixelated;z-index:2}
.detail-title{font-size:24px;font-weight:900;margin:4px 0;color:#fff;text-shadow:0 2px 5px #000}
.detail-rarity{font-weight:900;margin-bottom:8px}
.detail-desc{color:#cbd5e1;line-height:1.5;font-size:14px;background:rgba(255,255,255,.06);border-radius:12px;padding:10px;margin:10px 0}
.detail-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.detail-stat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px;font-size:13px}
.catch-popup-card{animation:catchPop .32s ease-out both;text-align:center}
@keyframes catchPop{0%{transform:scale(.82);opacity:0}100%{transform:scale(1);opacity:1}}
.catch-popup-card.legend{box-shadow:0 0 60px rgba(250,204,21,.45),0 24px 80px rgba(0,0,0,.55)}
.catch-reward{font-size:14px;color:#facc15;font-weight:900;margin-top:8px}
.screen-shake{animation:screenShake .35s linear both}
@keyframes screenShake{0%,100%{transform:translate(0,0)}20%{transform:translate(-5px,2px)}40%{transform:translate(4px,-2px)}60%{transform:translate(-3px,-1px)}80%{transform:translate(3px,2px)}}

.bottom-tabs{position:fixed;left:0;right:0;bottom:0;z-index:20;display:grid;grid-template-columns:repeat(4,1fr);background:#020617;border-top:1px solid rgba(255,255,255,.16);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
.tab-btn{background:transparent;color:#d1d5db;margin:0;padding:8px 2px;border-radius:14px;font-size:12px;line-height:1.25}
.tab-btn.active{background:#f59e0b;color:#111827}

body.playing-mini{overflow:hidden}
body.playing-mini h1,
body.playing-mini .top-bar,
body.playing-mini .quick-stats,
body.playing-mini #locationBox,
body.playing-mini #pond,
body.playing-mini #normalControls{display:none!important}
body.playing-mini .wrap{padding:4px}
body.playing-mini #miniGameBox{display:block!important;margin-top:4px}
body.playing-mini #fishGame{height:calc(100vh - 165px);min-height:430px}
body.playing-mini #track{height:calc(100vh - 205px);min-height:390px}
body.playing-mini #fishSprite{left:14px}
body.playing-mini #holdBtn{position:fixed;left:12px;right:12px;bottom:118px;z-index:30;height:48px}


body.playing-mini #miniStatus{
  display:inline-block;
  background:rgba(15,23,42,.78);
  border:1px solid rgba(255,255,255,.16);
  border-radius:999px;
  padding:8px 14px;

onAuthStateChanged(auth, async user=>{
  if(!user){location.href="./index.html";return;}
  uid=user.uid;
  await loadUser();
  loadingBox.classList.add("hidden");
  gameBox.classList.remove("hidden");
  bottomTabs.classList.remove("hidden");

async function loadUser(){
  const snap=await get(ref(db,`users/${uid}`));
  userData=snap.val()||{};
  const defaultFishing={gold:0,gems:0,rodLevel:1,exp:0,nextExp:100,title:"초보 낚시꾼",bait:5,inventory:{},discovered:{},treasureOpened:0,totalCaught:0,totalEarned:0,updatedAt:Date.now()};
  fishing={...defaultFishing,...(userData.fishing||{})};
  fishing.inventory=fishing.inventory||{};
  fishing.discovered=fishing.discovered||{};
  fishing.treasureOpened=fishing.treasureOpened||0;
  fishing.profile=fishing.profile||{avatar:"male",nickname:(userData.nickname||auth.currentUser.email.split("@")[0])};

  for(const key of Object.keys(fishing.inventory)){
    const parsed=parseInventoryKey(key);
    if(FISHES[parsed.fishKey]) fishing.discovered[parsed.fishKey]=true;
    else if(FISHES[key]) fishing.discovered[key]=true;
  }

  if(!userData.fishing) await update(ref(db,`users/${uid}`),{fishing});
  applyProfileUI();
  render();
}

async function saveGame(){
  fishing.updatedAt=Date.now();

  mainStatus.textContent="저장 완료!";

function formatNumber(n){
  n=Number(n||0);
  if(n>=1_0000_0000_0000) return (n/1_0000_0000_0000).toFixed(1).replace(/\.0$/,'')+'조';
  if(n>=1_0000_0000) return (n/1_0000_0000).toFixed(1).replace(/\.0$/,'')+'억';
  if(n>=10000) return (n/10000).toFixed(1).replace(/\.0$/,'')+'만';
  return String(n);
}

  return type==='female' ? './assets/avatars/female_01.png' : './assets/avatars/male_01.png';

  const profile=fishing?.profile||{};

  userEmail.textContent=userData.email||auth.currentUser.email;
  updateProfileProgress();

function renderLocations(){
  locationGrid.innerHTML="";
  for(const [key,loc] of Object.entries(LOCATIONS)){
    const locked=(fishing.rodLevel||1)<loc.requiredRod;
    const div=document.createElement("div");
    div.className=`location-card ${selectedLocation===key?"active":""} ${locked?"locked":""}`;
    div.innerHTML=`
      <img class="location-thumb" src="${loc.card}" alt="${loc.name}">
      <b>${loc.name}</b>
      <div class="lv">Lv.${loc.requiredRod}+ 필요</div>
      <div class="location-meta"><span class="location-pill ${loc.requiredRod<=2?'safe':loc.requiredRod<=4?'warn':'danger'}">${loc.requiredRod<=2?'안전':loc.requiredRod<=4?'주의':'위험'}</span></div>
    `;
    div.onclick=()=>{
      if(locked){mainStatus.textContent=`${loc.name}은 낚싯대 Lv.${loc.requiredRod}부터 갈 수 있습니다.`;return;}
      selectedLocation=key;
      mainStatus.textContent=`${loc.emoji} ${loc.name}에서 낚시합니다.`;

      updateCurrentLocationTitle();

function makeFishCardElement({key,fishKey,sizeKey='normal',count=0,known=true,clickable=false}){
  const fish=FISHES[fishKey];

  const displayName=known ? (sizeKey && sizeKey!=='normal' ? getSizedFishName(fishKey,sizeKey) : fish.name) : '???';
  const card=document.createElement('div');
  card.className=`fish-card rarity-${fish.rarity} ${known?'':'locked'}`;
  card.innerHTML=`
    <img class="frame" src="${frame}" alt="">
    <img class="fish-img" src="${fish.img}" alt="${known?displayName:'미발견'}">
    ${known&&count>0?`<div class="fish-count">x${count}</div>`:''}
    ${known?`<div class="fish-price">${sizeKey?getFishSellPrice(fishKey,sizeKey):fish.price}G</div>`:''}
    <div class="fish-name">${displayName}</div>

function updateProfileProgress(){
  if(!fishing)return;
  const exp=Number(fishing.exp||0);
  const next=Number(fishing.nextExp||100);
  const pct=Math.max(0,Math.min(100,Math.round((exp/next)*100)));
  const fill=$('hudExpFill');
  const text=$('hudExpText');
  const title=$('playerTitle');
  if(fill)fill.style.width=pct+'%';
  if(text)text.textContent=pct+'%';
  if(title)title.textContent=fishing.title||getPlayerTitle();
}

function getPlayerTitle(){
  const caught=fishing?.totalCaught||0;
  const discovered=Object.keys(fishing?.discovered||{}).length;
  if(discovered>=18)return '전설 수집가';
  if(caught>=100)return '숙련 낚시꾼';
  if(caught>=30)return '강태공';
  return '초보 낚시꾼';
}

function addExp(amount){
  fishing.exp=(fishing.exp||0)+amount;
  fishing.nextExp=fishing.nextExp||100;
  while(fishing.exp>=fishing.nextExp){
    fishing.exp-=fishing.nextExp;
    fishing.nextExp=Math.round(fishing.nextExp*1.25+25);
    fishing.gems=(fishing.gems||0)+3;
  }
  fishing.title=getPlayerTitle();
}

function openSellPrompt(key,displayName,count,sellPrice){
  const amount=prompt(`${displayName} 몇 마리 판매할까요?\n보유: ${count}마리 / 1마리 ${sellPrice}G`,"1");
  if(amount===null)return;
  const num=Math.floor(Number(amount));
  if(!num||num<=0)return;
  sellFishAmount(key,num);
}

window.sellFishAmount=async function(key,amount){
  const have=fishing.inventory?.[key]||0;
  amount=Math.floor(Number(amount));
  if(amount<1)return;
  if(amount>have){mainStatus.textContent="보유 수량보다 많이 팔 수 없습니다.";return;}

  const parsed=parseInventoryKey(key);
  const fishKey=parsed.fishKey;
  const sizeKey=parsed.sizeKey;
  const earn=getFishSellPrice(fishKey,sizeKey)*amount;

  fishing.inventory[key]-=amount;
  if(fishing.inventory[key]<=0)delete fishing.inventory[key];

  fishing.gold+=earn;
  fishing.totalEarned=(fishing.totalEarned||0)+earn;
  mainStatus.textContent=`${getSizedFishName(fishKey,sizeKey)} ${amount}마리를 팔아 ${earn}G를 벌었습니다.`;

  render();
  await saveGame();
};

function castLine(){
  if(isCasting||miniRunning)return;
  if(fishing.bait<=0){mainStatus.textContent="미끼가 부족합니다.";return;}

  const loc=LOCATIONS[selectedLocation];
  if((fishing.rodLevel||1)<loc.requiredRod){mainStatus.textContent=`이 낚시터는 낚싯대 Lv.${loc.requiredRod}부터 가능합니다.`;return;}

  fishing.bait-=1;
  targetFishKey=pickFishByLocation(selectedLocation);

  isCasting=true; biteReady=false; waitingToStart=false; actualMiniStarted=false; holding=false;
  catchResult.innerHTML="";
  biteBtn.classList.add("hidden");
  floatBobber.className="waiting";
  showBobberRipple();
  hideFishShadow();
  showLocationScene();

  mainStatus.textContent=`${loc.emoji} ${loc.name}에 찌를 던졌습니다...`;
  render();

  const wait=1800+Math.random()*4200;
  biteTimer=setTimeout(showBite,wait);
}

function pickFishByLocation(locationKey){
  const loc=LOCATIONS[locationKey];
  const rodBonus=Math.max(0,(fishing.rodLevel||1)-1);
  const table=loc.fishes.map(key=>{
    const fish=FISHES[key];
    let weight=fish.rate;
    if(fish.rarity==="rare")weight+=rodBonus*1.25;
    if(fish.rarity==="epic")weight+=rodBonus*.7;
    if(fish.rarity==="legend")weight+=rodBonus*.25;
    return [key,weight];
  });

  const total=table.reduce((sum,item)=>sum+item[1],0);
  let r=Math.random()*total;
  for(const [key,weight] of table){r-=weight;if(r<=0)return key;}
  return loc.fishes[0];
}

function pickFishSize(){
  const entries=Object.entries(FISH_SIZES);
  const total=entries.reduce((sum,item)=>sum+item[1].rate,0);
  let r=Math.random()*total;
  for(const [key,size] of entries){r-=size.rate;if(r<=0)return key;}
  return "normal";
}

function getInventoryKey(fishKey,sizeKey){return `${fishKey}_${sizeKey}`;}

function parseInventoryKey(invKey){
  const parts=invKey.split("_");
  const sizeKey=parts.pop();
  const fishKey=parts.join("_");
  if(FISHES[fishKey]&&FISH_SIZES[sizeKey]) return {fishKey,sizeKey};
  return {fishKey:invKey,sizeKey:"normal"};
}

function getFishSellPrice(fishKey,sizeKey){
  const fish=FISHES[fishKey];
  const size=FISH_SIZES[sizeKey]||FISH_SIZES.normal;
  return Math.round(fish.price*size.priceMul);
}

function getSizedFishName(fishKey,sizeKey){
  const fish=FISHES[fishKey];
  const size=FISH_SIZES[sizeKey]||FISH_SIZES.normal;
  return `${size.name} ${fish.name}`;
}

function updateVerticalProgress(){
  if(!verticalProgressFill)return;
  const value=Math.max(0,Math.min(100,progressValue));
  verticalProgressFill.style.height=value+"%";

  if(value>=75){
    verticalProgressFill.style.background="linear-gradient(180deg,#a3e635,#22c55e)";
  }else if(value>=50){
    verticalProgressFill.style.background="linear-gradient(180deg,#fde047,#eab308)";
  }else if(value>=25){
    verticalProgressFill.style.background="linear-gradient(180deg,#fb923c,#f97316)";
  }else{
    verticalProgressFill.style.background="linear-gradient(180deg,#f87171,#ef4444)";
  }

  if(value>=96){
    verticalProgressFill.classList.add("ready");
  }else{
    verticalProgressFill.classList.remove("ready");
  }
}

function loopMiniGame(){
  if(!miniRunning)return;

  if(waitingToStart){
    catchBar.style.top=barY+"px";
    catchBar.style.height="60px";
    fishSprite.style.top=fishY+"px";
    updateVerticalProgress();
    animationId=requestAnimationFrame(loopMiniGame);
    return;
  }

  const targetFish=FISHES[targetFishKey];
  const rodLevel=fishing.rodLevel||1;
  const sizeInfo=FISH_SIZES[targetSizeKey]||FISH_SIZES.normal;
  const trackHeight=$("track").clientHeight;

  const barHeight=Math.max(50,70+rodLevel*6);
  const fishSpeed=targetFish.speed*sizeInfo.difficulty*Math.max(.68,1.14-rodLevel*.045);

  fishPatternTime+=1;
  fishV+=getFishMovement(targetFish,fishPattern,fishPatternTime)*fishSpeed;
  fishV*=.82;
  fishY+=fishV;

  if(fishY<4){fishY=4;fishV*=-.58;}
  const maxFishY=trackHeight-28;
  if(fishY>maxFishY){fishY=maxFishY;fishV*=-.58;}

  const controlSpeed=4.6+rodLevel*.25;
  const gravitySpeed=3.6+rodLevel*.18;

  if(holding)barY-=controlSpeed;
  else barY+=gravitySpeed;

  barY=Math.max(0,Math.min(trackHeight-barHeight,barY));

  const fishCenter=fishY+16;
  const inBar=fishCenter>=barY&&fishCenter<=barY+barHeight;

  if(inBar)progressValue+=.42+rodLevel*.06;
  else progressValue-=.22;

  progressValue=Math.max(0,Math.min(100,progressValue));

  catchBar.style.top=barY+"px";
  catchBar.style.height=barHeight+"px";
  fishSprite.style.top=fishY+"px";
  updateVerticalProgress();

  if(progressValue>=100){finishFishing(true);return;}
  if(progressValue<=0){finishFishing(false);return;}
  animationId=requestAnimationFrame(loopMiniGame);
}

function createFishPattern(fish){
  const priceTier=fish.price>=200?5:fish.price>=80?4:fish.price>=50?3:fish.price>=28?2:1;
  return {
    type:Math.floor(Math.random()*120),
    phaseA:Math.random()*Math.PI*2,
    phaseB:Math.random()*Math.PI*2,
    phaseC:Math.random()*Math.PI*2,
    speedA:.025+Math.random()*.055,
    speedB:.04+Math.random()*.08,
    speedC:.008+Math.random()*.025,
    twitchRate:.005*priceTier+Math.random()*.012,
    twitchPower:1+priceTier*.9+Math.random()*1.6,
    drift:(Math.random()-.5)*.42,
    tier:priceTier
  };
}

function getFishMovement(fish,p,t){
  let m=0;
  const waveA=Math.sin(t*p.speedA+p.phaseA);
  const waveB=Math.sin(t*p.speedB+p.phaseB);
  const waveC=Math.sin(t*p.speedC+p.phaseC);
  const mode=p.type%12;

  if(mode===0)m=waveA*.35+waveB*.2;
  else if(mode===1)m=waveA>0?.48:-.28;
  else if(mode===2)m=waveA*waveB*.7;
  else if(mode===3)m=Math.sign(waveA)*.4+waveB*.18;
  else if(mode===4)m=waveA*.22+Math.sin(t*.13+p.phaseB)*.4;
  else if(mode===5)m=waveC*.55+p.drift;
  else if(mode===6)m=Math.sin(t*p.speedA+Math.sin(t*.03))*.62;
  else if(mode===7)m=waveA*.18+(Math.random()-.5)*.42;
  else if(mode===8){m=waveA*.6;if(Math.abs(waveA)>.85)m*=1.9;}
  else if(mode===9)m=waveA*.3+waveB*.27+waveC*.25;
  else if(mode===10)m=Math.sin(t*.02+p.phaseA)*.86;
  else m=(Math.random()-.48)*.62;

  if(Math.random()<p.twitchRate)m+=(Math.random()>.5?1:-1)*p.twitchPower;

  const priceBoost=fish.price>=200?1.55:fish.price>=80?1.35:fish.price>=50?1.18:fish.price>=28?1.05:.88;
  return m*priceBoost;
}

async function finishFishing(success){
  miniRunning=false;
  waitingToStart=false;
  actualMiniStarted=false;
  holding=false;
  document.body.classList.remove("playing-mini");
  hideLocationScene();

  if(animationId)cancelAnimationFrame(animationId);

  normalControls.classList.remove("hidden");
  miniGameBox.classList.add("hidden");

  if(success){
    const fish=FISHES[targetFishKey];
    const invKey=getInventoryKey(targetFishKey,targetSizeKey);
    const sizedName=getSizedFishName(targetFishKey,targetSizeKey);

    fishing.inventory=fishing.inventory||{};
    fishing.discovered=fishing.discovered||{};
    fishing.inventory[invKey]=(fishing.inventory[invKey]||0)+1;
    fishing.discovered[targetFishKey]=true;
    fishing.totalCaught=(fishing.totalCaught||0)+1;
    addExp(12 + Math.round(fish.price/8));

    const treasureText=applyTreasureReward();

    catchResult.innerHTML=`
      <img src="${fish.img}" alt="${fish.name}">
      <b class="r-${fish.rarity}">${sizedName}</b> 획득!
      ${treasureText ? `<div class="status">${treasureText}</div>` : ""}
    `;
    mainStatus.textContent=`정체는 ${sizedName}이었습니다!`;
    showCatchPopup(targetFishKey,targetSizeKey,treasureText);
  }else{
    catchResult.innerHTML="";
    mainStatus.textContent="물고기가 도망갔습니다. 정체는 알 수 없습니다.";
  }

  render();
  await saveGame();
}

function applyTreasureReward(){
  let chance=0.06;
  if(targetSizeKey==="huge")chance+=0.04;
  if(targetSizeKey==="monster")chance+=0.08;
  if(FISHES[targetFishKey].rarity==="rare")chance+=0.03;
  if(FISHES[targetFishKey].rarity==="epic")chance+=0.045;
  if(FISHES[targetFishKey].rarity==="legend")chance+=0.06;

  if(Math.random()>chance)return "";

  const roll=Math.random();
  fishing.treasureOpened=(fishing.treasureOpened||0)+1;

  if(roll<0.45){
    const gold=50+Math.floor(Math.random()*151);
    fishing.gold+=gold;
    return `📦 보물상자 발견! ${gold}G 획득!`;
  }

  if(roll<0.8){
    const bait=3+Math.floor(Math.random()*8);
    fishing.bait+=bait;
    return `📦 보물상자 발견! 미끼 ${bait}개 획득!`;
  }

  const gold=200+Math.floor(Math.random()*301);
  const bait=5+Math.floor(Math.random()*11);
  fishing.gold+=gold;
  fishing.bait+=bait;
  return `📦 희귀 보물상자! ${gold}G + 미끼 ${bait}개 획득!`;
}

function clearTimers(){
  if(biteTimer)clearTimeout(biteTimer);
  if(biteWindowTimer)clearTimeout(biteWindowTimer);
  biteTimer=null;
  biteWindowTimer=null;
}

async function sellAllFish(){
  const inv=fishing.inventory||{};
  let earn=0;

  for(const [key,count] of Object.entries(inv)){
    const parsed=parseInventoryKey(key);
    if(FISHES[parsed.fishKey]) earn+=getFishSellPrice(parsed.fishKey,parsed.sizeKey)*count;
  }

  if(earn<=0){mainStatus.textContent="판매할 물고기가 없습니다.";return;}

  fishing.gold+=earn;
  fishing.totalEarned=(fishing.totalEarned||0)+earn;
  fishing.inventory={};

  mainStatus.textContent=`물고기를 모두 팔아 ${earn} G를 벌었습니다.`;
  render();
  await saveGame();
}

window.changeSellQty=function(key,delta){
  const el=document.getElementById(`sell_${key}`);
  const have=fishing.inventory?.[key]||0;
  if(!el||have<=0)return;
  let value=Number(el.textContent||1)+delta;
  if(value<1)value=1;
  if(value>have)value=have;
  el.textContent=value;
};

window.sellFish=async function(key){
  const input=document.getElementById(`sell_${key}`);
  const have=fishing.inventory?.[key]||0;
  let amount=Math.floor(Number(input.textContent||1));
  if(amount<1)amount=1;
  if(amount>have){mainStatus.textContent="보유 수량보다 많이 팔 수 없습니다.";return;}

  const parsed=parseInventoryKey(key);
  const fishKey=parsed.fishKey;
  const sizeKey=parsed.sizeKey;
  const earn=getFishSellPrice(fishKey,sizeKey)*amount;

  fishing.inventory[key]-=amount;
  if(fishing.inventory[key]<=0)delete fishing.inventory[key];

  fishing.gold+=earn;
  fishing.totalEarned=(fishing.totalEarned||0)+earn;
  mainStatus.textContent=`${getSizedFishName(fishKey,sizeKey)} ${amount}마리를 팔아 ${earn} G를 벌었습니다.`;

  render();
  await saveGame();
};

async function upgradeRod(){
  const cost=getUpgradeCost();
  if(fishing.gold<cost){mainStatus.textContent="골드가 부족합니다.";return;}

  fishing.gold-=cost;
  fishing.rodLevel+=1;
  mainStatus.textContent=`낚싯대가 Lv.${fishing.rodLevel}(으)로 업그레이드되었습니다.`;

  render();
  await saveGame();
}

async function buyBait(){
  if(fishing.gold<30){mainStatus.textContent="골드가 부족합니다.";return;}

  fishing.gold-=30;
  fishing.bait+=5;
  mainStatus.textContent="미끼 5개를 구매했습니다.";

  render();
  await saveGame();
}

function getUpgradeCost(){return 100+((fishing.rodLevel||1)-1)*120;}

document.addEventListener("keydown",e=>{
  if(e.code==="Space"){
    if(isCasting&&biteReady) reactBite();
    else {forceStartMiniGame();holding=true;}
    e.preventDefault();
  }
});

document.addEventListener("keyup",e=>{
  if(e.code==="Space"){holding=false;e.preventDefault();}
});

const holdBtn=$("holdBtn");
holdBtn.addEventListener("mousedown",()=>{forceStartMiniGame();holding=true;});
holdBtn.addEventListener("mouseup",()=>holding=false);
holdBtn.addEventListener("mouseleave",()=>holding=false);
holdBtn.addEventListener("touchstart",e=>{forceStartMiniGame();holding=true;e.preventDefault();},{passive:false});
holdBtn.addEventListener("touchend",e=>{holding=false;e.preventDefault();},{passive:false});


const avatarModal=$('avatarModal');
const nicknameInput=$('nicknameInput');
let selectedAvatar='male';
function openProfileModal(){
  selectedAvatar=(fishing.profile&&fishing.profile.avatar)||'male';
  nicknameInput.value=(fishing.profile&&fishing.profile.nickname)||userName.textContent||'';
  document.querySelectorAll('.avatar-choice').forEach(el=>{
    el.classList.toggle('selected', el.dataset.avatar===selectedAvatar);
  });
  avatarModal.classList.add('show');
}
function closeProfileModal(){avatarModal.classList.remove('show')}
document.querySelectorAll('.avatar-choice').forEach(el=>{
  el.onclick=()=>{
    selectedAvatar=el.dataset.avatar;
    document.querySelectorAll('.avatar-choice').forEach(x=>x.classList.toggle('selected',x===el));
  };
});
if($('closeFishDetailBtn'))$('closeFishDetailBtn').onclick=()=>fishDetailModal.classList.remove('show');
if(fishDetailModal)fishDetailModal.onclick=e=>{if(e.target===fishDetailModal)fishDetailModal.classList.remove('show')};
if($('closeCatchPopupBtn'))$('closeCatchPopupBtn').onclick=()=>catchPopup.classList.remove('show');
if(catchPopup)catchPopup.onclick=e=>{if(e.target===catchPopup)catchPopup.classList.remove('show')};
$('avatarBtn').onclick=openProfileModal;
$('profileCard').onclick=openProfileModal;
$('closeProfileBtn').onclick=closeProfileModal;
$('saveProfileBtn').onclick=async()=>{
  const nickname=(nicknameInput.value||'낚시꾼').trim().slice(0,16);
  fishing.profile={avatar:selectedAvatar,nickname};
  applyProfileUI();
  closeProfileModal();
  await saveGame();
};

$("fishBtn").onclick=castLine;
$("biteBtn").onclick=reactBite;
$("sellAllBtn").onclick=sellAllFish;
$("upgradeRodBtn").onclick=upgradeRod;
$("buyBaitBtn").onclick=buyBait;
$("saveBtn").onclick=saveGame;

document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".tab-page").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab"+btn.dataset.tab).classList.add("active");
  };
});
